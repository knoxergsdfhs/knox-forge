<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>Forge — 3D modeling with AI</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-2: #14141b;
    --card: #1a1a24;
    --card-2: #20202d;
    --border: #2a2a38;
    --border-soft: #20202b;
    --text: #f4f4f7;
    --muted: #8a8a98;
    --muted-2: #6b6b78;
    --primary: #7c5cff;
    --primary-2: #a78bff;
    --accent: #14b8a6;
    --red: #ff5c7a;
    --green: #5cff8a;
    --yellow: #ffd05c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 80% -10%, #1f1233 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'InterVariable', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    letter-spacing: -0.011em;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #app { min-height: 100vh; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

  /* ───── Brand mark ───── */
  .brand-mark {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: grid; place-items: center;
    position: relative;
  }
  .brand-mark svg { width: 18px; height: 18px; }

  /* ───── Auth / landing ───── */
  .auth-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }
  .auth-card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 32px; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .logo-text { font-weight: 700; font-size: 17px; letter-spacing: -0.4px; line-height: 1.1; }
  .logo-text small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); letter-spacing: 0; margin-top: 3px; }
  .auth-title { font-size: 26px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 6px; }
  .auth-sub { color: var(--muted); font-size: 14px; line-height: 1.55; margin-bottom: 22px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 7px; }
  .field input { width: 100%; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--primary); }
  .btn { width: 100%; border: none; border-radius: 12px; padding: 13px; font-weight: 600; font-size: 14px; cursor: pointer; transition: transform 0.1s; font-family: inherit; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }
  .btn-secondary { background: var(--bg-2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--primary); }
  .btn-row { display: flex; gap: 8px; }
  .auth-toggle { margin-top: 14px; text-align: center; font-size: 13px; color: var(--muted); }
  .auth-toggle a { color: var(--primary-2); text-decoration: none; font-weight: 600; cursor: pointer; }
  .auth-err { background: rgba(255,92,122,0.1); border: 1px solid rgba(255,92,122,0.4); color: var(--red); padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; }

  /* ───── App shell ───── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 230px; background: rgba(10,10,15,0.6); border-right: 1px solid var(--border-soft); padding: 18px 12px; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh; }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px 18px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 8px; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .nav-item.active { background: rgba(124,92,255,0.12); color: var(--text); }
  .nav-item.active svg { color: var(--primary); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--muted-2); }
  /* Constrain all icons inside buttons / labels acting as buttons */
  .btn svg, label.btn svg, .app-chip svg, .preset-chip svg { width: 16px; height: 16px; flex-shrink: 0; vertical-align: middle; }
  .page-title svg { width: 22px; height: 22px; vertical-align: middle; }
  .nav-divider { height: 1px; background: var(--border-soft); margin: 10px 4px; }
  .user-row { margin-top: auto; padding: 10px; border-top: 1px solid var(--border-soft); display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center; font-weight: 700; font-size: 12px; color: var(--bg); flex-shrink: 0; }
  .user-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .user-row .ghost-btn { background: transparent; border: none; color: var(--muted-2); cursor: pointer; padding: 4px; }
  .user-row .ghost-btn:hover { color: var(--red); }

  .main { flex: 1; padding: 32px 32px 64px; max-width: 1100px; }
  .page-header { margin-bottom: 28px; }
  .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.7px; line-height: 1.15; }
  .page-sub { color: var(--muted); font-size: 14px; margin-top: 6px; line-height: 1.55; }

  /* ───── Forge (Generate) ───── */
  .prompt-shell { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 24px; }
  .prompt-shell textarea { width: 100%; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); font-family: inherit; font-size: 15px; line-height: 1.5; resize: vertical; min-height: 90px; outline: none; }
  .prompt-shell textarea:focus { border-color: var(--primary); }
  .prompt-shell .row { display: flex; gap: 10px; margin-top: 14px; align-items: center; }
  .prompt-shell .row .meta { flex: 1; font-size: 12px; color: var(--muted-2); }
  .preset-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
  .preset-chip { background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .preset-chip:hover { color: var(--text); border-color: var(--primary); }
  .preset-chip.active { background: rgba(124,92,255,0.15); color: var(--primary-2); border-color: var(--primary); }

  /* ───── Viewer ───── */
  .viewer-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-bottom: 24px; }
  .viewer-head { padding: 14px 18px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .viewer-head h3 { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; }
  .viewer-head .pill { background: var(--bg-2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 999px; font-size: 11px; color: var(--muted); }
  #viewer-canvas { width: 100%; height: 420px; background: radial-gradient(circle at 50% 40%, #1a1830 0%, #0a0a0f 70%); display: block; }
  .viewer-toolbar { padding: 12px 18px; border-top: 1px solid var(--border-soft); display: flex; gap: 8px; flex-wrap: wrap; }
  .viewer-toolbar .btn { width: auto; padding: 8px 14px; font-size: 13px; }
  .export-app-row { padding: 10px 18px 14px; border-top: 1px solid var(--border-soft); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .export-app-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .app-chip { background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 7px 13px; font-size: 12px; color: var(--text); cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .app-chip:hover { border-color: var(--primary); background: rgba(124,92,255,0.1); }
  .model-notes { padding: 10px 18px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border-soft); background: rgba(124,92,255,0.04); }
  .anim-caption { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); color: white; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.4); pointer-events: none; max-width: 80%; text-align: center; z-index: 5; }
  /* Scan page */
  .scan-wrap { max-width: 720px; margin: 24px auto; }
  .scan-viewfinder { background: var(--bg-2); border: 1px solid var(--border); border-radius: 18px; aspect-ratio: 4/3; display: grid; place-items: center; overflow: hidden; position: relative; }
  .scan-viewfinder video, .scan-viewfinder img { width: 100%; height: 100%; object-fit: cover; }
  .scan-empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .scan-empty .empty-icon { width: 56px; height: 56px; margin: 0 auto 14px; color: var(--muted); }
  .scan-empty .empty-icon svg { width: 100%; height: 100%; }
  .scan-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 18px 0; }
  .scan-controls .btn { width: auto; padding: 10px 18px; }
  .scan-tip { font-size: 12px; color: var(--muted); text-align: center; padding-bottom: 20px; }
  /* Scan modes + batch strip */
  .scan-mode-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
  .scan-mode-chip { background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 8px 16px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .scan-mode-chip:hover { color: var(--text); border-color: var(--primary); }
  .scan-mode-chip.active { background: rgba(124,92,255,0.18); color: var(--primary-2); border-color: var(--primary); font-weight: 600; }
  .scan-rec-indicator { position: absolute; top: 12px; left: 12px; background: rgba(220,38,38,0.95); color: white; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 999px; animation: scan-pulse 1.4s ease-in-out infinite; z-index: 3; }
  @keyframes scan-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  .scan-batch-strip { display: flex; gap: 6px; overflow-x: auto; padding: 10px 4px; flex-wrap: nowrap; }
  .scan-thumb { width: 72px; height: 72px; min-width: 72px; border-radius: 10px; background-size: cover; background-position: center; position: relative; border: 1px solid var(--border); }
  .scan-thumb-remove { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.75); color: white; border: none; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; line-height: 1; cursor: pointer; padding: 0; }
  .scan-thumb-num { position: absolute; bottom: 2px; left: 4px; background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 600; }
  /* Click-to-fill example chips */
  .examples-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 14px 0 4px; align-items: center; }
  .examples-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .example-chip { background: rgba(124,92,255,0.08); border: 1px solid rgba(124,92,255,0.25); border-radius: 999px; padding: 6px 12px; font-size: 12px; color: var(--text); cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .example-chip:hover { background: rgba(124,92,255,0.18); border-color: var(--primary); }
  /* Refine shell — appears below the prompt-shell after a model exists */
  .refine-shell { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 18px; margin-top: 14px; }
  .refine-label { display: flex; align-items: center; font-size: 13px; margin-bottom: 10px; }
  .refine-label svg { color: var(--primary); }
  .refine-row { display: flex; gap: 8px; align-items: center; }
  .refine-row input { flex: 1; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text); font-size: 13px; font-family: inherit; }
  .refine-row input:focus { outline: none; border-color: var(--primary); }
  .refine-row .btn { width: auto; padding: 9px 14px; font-size: 13px; }
  .refine-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .refine-suggestion { background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 5px 11px; font-size: 11px; color: var(--muted); cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .refine-suggestion:hover { color: var(--text); border-color: var(--primary); }
  /* Generation progress bar */
  .gen-progress { margin-top: 14px; }
  .gen-progress-bar { height: 4px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
  .gen-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-2)); width: 5%; transition: width 0.6s ease; border-radius: 999px; }
  .gen-progress-fill.err { background: var(--red, #ff5c7a); }
  .gen-progress-msg { font-size: 12px; color: var(--muted); margin-top: 6px; text-align: center; }
  /* My Models grid */
  .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .model-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; }
  .model-card:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(124,92,255,0.15); }
  .model-thumb { aspect-ratio: 4/3; background: var(--bg-2); position: relative; overflow: hidden; }
  .model-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .model-thumb-empty { width: 100%; height: 100%; display: grid; place-items: center; color: var(--muted); }
  .model-thumb-empty svg { width: 40px; height: 40px; }
  .model-card-del { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.65); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; font-size: 12px; line-height: 1; cursor: pointer; padding: 0; opacity: 0; transition: opacity 0.15s; }
  .model-card:hover .model-card-del { opacity: 1; }
  .model-card-del:hover { background: rgba(220,38,38,0.9); }
  .model-card-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .model-card-title { font-weight: 600; font-size: 14px; line-height: 1.3; }
  .model-card-prompt { font-size: 11px; color: var(--muted); line-height: 1.4; min-height: 30px; }
  .model-card-meta { font-size: 10px; color: var(--muted-2); margin-bottom: 8px; }
  .model-card-open { width: 100%; padding: 9px; font-size: 12px; }
  /* Print info panel */
  .print-info { padding: 14px 18px; border-top: 1px solid var(--border-soft); background: rgba(124,92,255,0.03); }
  .print-info.empty { display: flex; justify-content: center; padding: 18px; }
  .print-info-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 14px; }
  .print-info-stat { display: flex; flex-direction: column; gap: 2px; }
  .pi-label { font-size: 11px; color: var(--muted-2); text-transform: uppercase; letter-spacing: 0.4px; }
  .pi-val { font-size: 16px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .print-info-footer { font-size: 11px; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-soft); }
  .link-btn { background: none; border: none; color: var(--primary-2); cursor: pointer; padding: 0; font-size: inherit; font-family: inherit; text-decoration: underline; }
  .link-btn:hover { color: var(--primary); }
  /* Modal — printer / material pickers */
  .forge-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 1000; display: grid; place-items: center; padding: 20px; }
  .forge-modal-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; max-width: 720px; width: 100%; max-height: 86vh; overflow-y: auto; }
  .forge-modal-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .forge-modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .printer-grid, .material-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .printer-card, .material-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; cursor: pointer; text-align: left; font-family: inherit; transition: all 0.12s; color: var(--text); }
  .printer-card:hover, .material-card:hover { border-color: var(--primary); background: rgba(124,92,255,0.08); }
  .printer-card.active, .material-card.active { border-color: var(--primary); background: rgba(124,92,255,0.15); }
  .printer-card-name, .material-card-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .printer-card-meta, .material-card-meta { font-size: 11px; color: var(--muted); }
  .settings-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border-soft); }
  .settings-section:first-of-type { border-top: none; padding-top: 0; }
  .settings-section-title { font-size: 11px; color: var(--muted-2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600; }
  .settings-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .settings-row .btn { width: auto; padding: 7px 14px; font-size: 12px; white-space: nowrap; }
  /* Onboarding tour card */
  .tour-card { max-width: 460px; }
  .tour-art { aspect-ratio: 16/9; background: linear-gradient(135deg, rgba(124,92,255,0.2), rgba(92,255,208,0.15)); border-radius: 14px; margin-bottom: 16px; display: grid; place-items: center; font-size: 64px; }
  .tour-dots { display: flex; gap: 6px; justify-content: center; margin-top: 14px; }
  .tour-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-2); }
  .tour-dot.active { background: var(--primary); width: 18px; border-radius: 999px; transition: all 0.2s; }
  .tour-actions { display: flex; justify-content: space-between; margin-top: 18px; gap: 10px; }
  .tour-actions .btn { width: auto; padding: 9px 18px; font-size: 13px; }
  /* My Models search */
  .models-search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; }
  .models-search { flex: 1; padding: 9px 14px 9px 38px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-2); color: var(--text); font-size: 13px; font-family: inherit; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237a7a8a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='8'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>"); background-repeat: no-repeat; background-position: 12px center; background-size: 16px; }
  .models-search:focus { outline: none; border-color: var(--primary); }
  /* Image preview thumbnail in prompt area */
  .ref-image-preview { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 4px 10px 4px 4px; font-size: 12px; color: var(--muted); margin-right: 8px; }
  .ref-image-preview img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; }
  .ref-image-remove { background: none; border: none; color: var(--red, #ff5c7a); cursor: pointer; font-size: 14px; padding: 0 4px; }
  /* MOBILE RESPONSIVE — collapse sidebar to bottom-tab nav on narrow screens */
  @media (max-width: 780px) {
    .shell { flex-direction: column-reverse; }
    .nav {
      width: 100%; height: auto; max-height: 80px;
      flex-direction: row; padding: 8px 4px; border-top: 1px solid var(--border); border-right: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50; background: var(--card);
      overflow-x: auto;
    }
    .nav-brand, .nav-bottom { display: none; }
    .nav-items { flex-direction: row; gap: 4px; }
    .nav-item {
      flex-direction: column; padding: 6px 10px; min-width: 64px; text-align: center;
      font-size: 10px; font-weight: 500; gap: 4px;
    }
    .nav-item svg { width: 22px; height: 22px; }
    .main { padding: 16px 14px 90px; }
    .page-header { margin-bottom: 14px; }
    .page-title { font-size: 22px; }
    .prompt-shell, .refine-shell, .viewer-wrap { padding: 14px; border-radius: 14px; }
    .viewer-wrap canvas { min-height: 280px; }
    .viewer-toolbar .btn { font-size: 12px; padding: 8px 10px; }
    .export-app-row { gap: 6px; }
    .app-chip { padding: 6px 11px; font-size: 11px; }
    .models-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .scan-mode-row { gap: 4px; }
    .scan-mode-chip { padding: 7px 12px; font-size: 11px; }
    .scan-controls .btn { padding: 9px 12px; font-size: 12px; }
    .scan-thumb { width: 60px; height: 60px; min-width: 60px; }
    .examples-row { gap: 4px; padding-top: 10px; }
    .example-chip { font-size: 11px; padding: 5px 10px; }
    .doom-deck { max-width: 100%; margin: 14px 0; }
  }
  @media (max-width: 480px) {

  /* Light theme overrides */

  .recent-prompts-header { padding: 8px 14px; font-size: 10px; color: var(--muted-2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-soft); }

  /* Help shortcut hint pill */
  .kbd { display: inline-block; padding: 1px 6px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted); }

  /* Doom Printing category filter */

  /* Doom Printing category filter chips */
  .doom-filter-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 8px 0 16px; max-width: 700px; margin: 0 auto; }
  .doom-filter-chip { background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; font-size: 11px; color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.12s; }

function getSession() { try { return JSON.parse(localStorage.getItem(FORGE_SESSION_KEY) || "null"); } catch { return null; } }
function setSession(s) { localStorage.setItem(FORGE_SESSION_KEY, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(FORGE_SESSION_KEY); }
function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

async function hashPassword(password, saltHex) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const saltBytes = new Uint8Array(saltHex.match(/.{1,2}/g).map((b) => parseInt(b, 16)));
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: saltBytes, iterations: 100000, hash: "SHA-256" }, key, 256);
  return Array.from(new Uint8Array(bits)).map((b) => b.toString(16).padStart(2, "0")).join("");
}
function randomHex(n) {
  const b = new Uint8Array(n);
  crypto.getRandomValues(b);
  return Array.from(b).map((x) => x.toString(16).padStart(2, "0")).join("");
}

async function login(identifier, password) {
  const looksLikePhone = /^[+\d\s\-().]+$/.test(identifier) && !identifier.includes("@");
  const r = await fetch(`${NEXUS_API_BASE}/api/auth/login`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(looksLikePhone ? { phone: identifier.trim(), password } : { email: identifier.trim(), password }),
  });
  const j = await r.json();
  if (!r.ok || !j.ok) throw new Error(j.error || `Sign-in failed (${r.status})`);
  return j.user;
}
async function createAccount(identifier, password) {
  const looksLikePhone = /^[+\d\s\-().]+$/.test(identifier) && !identifier.includes("@");
  const salt = randomHex(16);
  const passwordHash = await hashPassword(password, salt);
  const id = identifier.trim().toLowerCase();
  const profile = looksLikePhone
    ? { phone: id, name: id, passwordHash, passwordSalt: salt, createdAt: new Date().toISOString(), shareProfile: true }
    : { email: id, name: id.split("@")[0] || id, passwordHash, passwordSalt: salt, createdAt: new Date().toISOString(), shareProfile: true };
  const r = await fetch(`${NEXUS_API_BASE}/api/users`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ id, profile }),
  });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `Couldn't create account (${r.status})`);
  return await login(identifier, password);
}

// Progress ticker — cycles through honest status messages during long AI calls
// feat #16: Multi-step progress with checkmarks
const GEN_STEPS_LABELS = ["Parsing description", "Designing geometry", "Calculating faces", "Optimizing mesh"];
function startProgressTicker(kind) {
  const messages = kind === "Refine"
    ? ["Reading your change…", "AI is updating the spec…", "Preserving everything else…", "Almost there…"]
    : ["Reading your prompt…", "AI is thinking about geometry…", "Checking real-world dimensions…", "Building the 3D spec…", "Validating dimensions…", "Almost done…"];
  const fill = document.getElementById("gen-progress-fill");
  const msg = document.getElementById("gen-progress-msg");
  const wrap = document.getElementById("gen-progress");
  if (!wrap) return { done: () => {}, fail: () => {} };
  wrap.style.display = "block";
  if (fill) { fill.style.width = "5%"; fill.classList.remove("err"); }
  let i = 0;
  let stepIdx = 0;
  if (msg) msg.innerText = messages[0];
  // Update step indicators
  function setStep(idx) {
    GEN_STEPS_LABELS.forEach((_, n) => {
      const el = document.getElementById("gstep-" + n);
      if (!el) return;
      el.className = "gen-step" + (n < idx ? " done" : n === idx ? " active" : "");
      el.textContent = (n < idx ? "✓ " : "") + GEN_STEPS_LABELS[n];
    });
  }
  setStep(0);
  const interval = setInterval(() => {
    i = (i + 1) % messages.length;
    if (msg) msg.innerText = messages[i];
    if (fill) {
      const pct = Math.min(92, parseFloat(fill.style.width || "5") + (10 + Math.random() * 14));
      fill.style.width = pct + "%";
    }
    stepIdx = Math.min(GEN_STEPS_LABELS.length - 1, stepIdx + 1);
    setStep(stepIdx);
  }, 1800);
  return {
    done: () => {
      clearInterval(interval);
      if (fill) fill.style.width = "100%";
      if (msg) msg.innerText = "Done!";
      setStep(GEN_STEPS_LABELS.length);
      setTimeout(() => { if (wrap) wrap.style.display = "none"; }, 700);
    },
    fail: () => {
      clearInterval(interval);
      if (fill) { fill.style.width = "100%"; fill.classList.add("err"); }
      if (msg) msg.innerText = "Failed";
      setTimeout(() => { if (wrap) wrap.style.display = "none"; }, 1500);
    },
  };
}

async function runRefine(el) {
  const input = document.getElementById("refine-input");
  const btn = document.getElementById("refine-btn");
  const refinement = input?.value.trim();
  if (!refinement) return;
  if (!lastSpec) return alert("Generate a model first");
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;
  const progress = startProgressTicker("Refine");
  try {
    const r = await fetch(`${NEXUS_API_BASE}/api/ai/forge-refine`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ spec: lastSpec, refinement, originalPrompt: lastPrompt }),
    });
    const j = await r.json();
    if (!r.ok || j.ok === false) throw new Error(j.error || `Refine failed (${r.status})`);
    if (!j.parts || j.parts.length === 0) throw new Error("Refinement returned an empty model");
    lastSpec = j;
    if (input) input.value = "";
    progress.done();
    renderForge(el);
    showToast("Model refined. Notes show what changed.", 4000);
  } catch (e) {
    progress.fail();
    showToast("Refine failed: " + (e.message || "unknown"), 6000);
    btn.disabled = false;
    btn.innerHTML = `↻ <span style="margin-left:6px">Apply</span>`;
  }
}

// Detect if a prompt is asking for an organic / character / animal shape
// that the primitive composer can't model. Triggers Organic Mode.
const ORGANIC_KEYWORDS = /\b(duck|dog|cat|bird|dragon|dinosaur|t-rex|trex|lizard|snake|fish|whale|shark|elephant|lion|tiger|bear|wolf|fox|rabbit|bunny|deer|horse|pig|cow|sheep|monkey|ape|gorilla|frog|turtle|octopus|squid|penguin|owl|eagle|owl|pegasus|unicorn|mermaid|griffin|phoenix|fairy|elf|orc|goblin|zombie|skeleton|alien|monster|creature|animal|action figure|figurine|figure|character|person|man|woman|child|baby|head|face|skull|hand|foot|arm|leg|body|toy|plushie|teddy|doll|robot|mech|bust|sculpture|gnome|santa|ghost|pumpkin|jack-o-lantern|snowman|reindeer|witch|wizard|cartoon|anime)\b/i;
function looksOrganic(prompt) { return ORGANIC_KEYWORDS.test(prompt); }

async function generateModelFromPrompt(prompt, presets = [], image = null) {
  // Auto-route: organic prompts → forge-organic (silhouette → layered ellipses)
  // unless user has explicitly disabled it via preset
  const userForcedPrimitive = presets.includes("functional part") || presets.includes("model");
  const userPickedOrganic = presets.some(p => p.toLowerCase().startsWith("organic"));
  const useOrganic = userPickedOrganic || (looksOrganic(prompt) && !userForcedPrimitive);
  const endpoint = useOrganic ? "/api/ai/forge-organic" : "/api/ai/forge-model";
  const payload = { input: prompt, presets };
  if (image && image.base64) {
    payload.imageBase64 = image.base64;
    payload.imageMimeType = image.mime || "image/png";
  }
  const r = await fetch(`${NEXUS_API_BASE}${endpoint}`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(payload),
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || `Generation failed (${r.status})`);
  if (j.ok === false) throw new Error(j.error || "AI didn't return a usable spec");
  if (!j.parts || !Array.isArray(j.parts) || j.parts.length === 0) {
    throw new Error("AI returned an empty model — try a more specific prompt");
  }
  return j;
}

// Geometry factory — converts one spec part into a THREE.BufferGeometry.
// Geometry is in LOCAL space (centered at origin). Caller applies the
// part's position/rotation onto a Brush wrapping the geometry.
function geomFromPart(p) {
  let geom;
  const kind = (p.kind || "box").toLowerCase();
  if (kind === "box" || kind === "cube") {
    const s = p.size || [10, 10, 10];
    geom = new THREE.BoxGeometry(s[0] || 10, s[1] || 10, s[2] || 10);
  } else if (kind === "sphere") {
    const r = p.radius || 10;
    geom = new THREE.SphereGeometry(r, 32, 24);
  } else if (kind === "cylinder") {
    const r = p.radius || 10;
    const h = (p.size && p.size[1]) || p.height || 10;
    geom = new THREE.CylinderGeometry(r, r, h, 32);
  } else if (kind === "cone") {
    const r = p.radius || 10;
    const h = (p.size && p.size[1]) || p.height || 10;
    geom = new THREE.ConeGeometry(r, h, 32);
  } else if (kind === "torus") {
    const r = p.radius || 10;
    const t = p.tube || 2;
    geom = new THREE.TorusGeometry(r, t, 16, 48);
  } else if (kind === "polyprism" || kind === "polygonprism" || kind === "polyprismatic") {
    const r = p.radius || 10;
    const h = (p.size && p.size[1]) || p.height || 10;
    const sides = Math.max(3, Math.min(32, p.sides || 6));
    geom = new THREE.CylinderGeometry(r, r, h, sides);
  } else if (kind === "extrude") {
    const outline = Array.isArray(p.outline) ? p.outline : [];
    const h = (p.size && p.size[1]) || p.height || 10;
    if (outline.length >= 3) {
      const shape = new THREE.Shape();
      shape.moveTo(outline[0][0], outline[0][1]);
      for (let i = 1; i < outline.length; i++) shape.lineTo(outline[i][0], outline[i][1]);
      shape.closePath();
      geom = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: false, curveSegments: 24 });
      geom.rotateX(-Math.PI / 2);
    } else {
      geom = new THREE.BoxGeometry(10, h, 10);
    }
  } else {
    const s = p.size || [10, 10, 10];
    geom = new THREE.BoxGeometry(s[0] || 10, s[1] || 10, s[2] || 10);
  }
  return geom;
}

// Real CSG: unions the "add" parts then subtracts the "subtract" parts.
// Returns a THREE.Group containing a single combined mesh. This makes
// hollows ACTUALLY hollow — both visually and in STL export.
function buildThreeGroupFromSpec(spec) {
  const group = new THREE.Group();
  const parts = spec.parts || [];
  if (parts.length === 0) return group;

  const evaluator = new Evaluator();
  evaluator.useGroups = false; // single material output
  evaluator.consolidateGroups = true;
  const baseColor = "#7c5cff";

  // Build Brush wrappers for every part
  const brushes = parts.map(p => {
    const geom = geomFromPart(p);
    const brush = new Brush(geom);
    const pos = p.position || [0, 0, 0];
    brush.position.set(pos[0] || 0, pos[1] || 0, pos[2] || 0);
    if (p.rotation) {
      const r = p.rotation;
      brush.rotation.set(
        THREE.MathUtils.degToRad(r[0] || 0),
        THREE.MathUtils.degToRad(r[1] || 0),
        THREE.MathUtils.degToRad(r[2] || 0)
      );
    }
    brush.updateMatrixWorld(true);
    brush.op = (p.op || "add").toLowerCase();
    brush.partColor = p.color || baseColor;
    return brush;
  });

  // Split into additive and subtractive
  const adds = brushes.filter(b => b.op !== "subtract" && b.op !== "sub");
  const subs = brushes.filter(b => b.op === "subtract" || b.op === "sub");

  // If we have at least one additive part, do real CSG. Else just render
  // everything as separate solids (fallback for malformed specs).
  if (adds.length > 0) {
    try {
      let result = adds[0];
      for (let i = 1; i < adds.length; i++) {
        result = evaluator.evaluate(result, adds[i], ADDITION);
      }
      for (const sub of subs) {
        result = evaluator.evaluate(result, sub, SUBTRACTION);
      }
      const mat = new THREE.MeshStandardMaterial({ color: adds[0].partColor || baseColor, roughness: 0.55, metalness: 0.05 });
      const finalMesh = new THREE.Mesh(result.geometry, mat);
      finalMesh.castShadow = true;
      finalMesh.receiveShadow = true;
      group.add(finalMesh);
      return group;
    } catch (err) {
      console.warn("CSG failed, falling back to non-boolean render:", err);
      // Fall through to simple render
    }
  }

  // Fallback: render each part as a separate mesh (no boolean ops)
  for (const b of brushes) {
    const mat = new THREE.MeshStandardMaterial({
      color: b.partColor || baseColor,
      roughness: 0.55,
      metalness: 0.05,
      // Subtract parts get rendered as semi-transparent ghosts to signal intent
      transparent: b.op === "subtract" || b.op === "sub",
      opacity: (b.op === "subtract" || b.op === "sub") ? 0.35 : 1,
    });
    const mesh = new THREE.Mesh(b.geometry, mat);
    mesh.position.copy(b.position);
    mesh.rotation.copy(b.rotation);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  }
  return group;
}

function downloadBlob(filename, content, mime = "application/octet-stream") {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ============================================================
// 3D viewer
// ============================================================
let viewerScene, viewerCamera, viewerRenderer, viewerControls, viewerGroup, viewerAnimId;
function initViewer(canvas) {
  if (viewerRenderer) viewerRenderer.dispose();
  if (viewerAnimId) cancelAnimationFrame(viewerAnimId);
  viewerScene = new THREE.Scene();
  viewerScene.background = null;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  viewerCamera = new THREE.PerspectiveCamera(45, w / h, 0.1, 5000);
  viewerCamera.position.set(70, 50, 70);
  viewerRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  viewerRenderer.setPixelRatio(window.devicePixelRatio || 1);
  viewerRenderer.setSize(w, h, false);
  viewerRenderer.shadowMap.enabled = true;

  // Lights
  const hemi = new THREE.HemisphereLight(0xb4baff, 0x202030, 0.6);
  viewerScene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(50, 80, 30);
  dir.castShadow = true;
  viewerScene.add(dir);
  const fill = new THREE.DirectionalLight(0x7c5cff, 0.3);
  fill.position.set(-40, 20, -30);
  viewerScene.add(fill);

  // Floor
  const floor = new THREE.Mesh(
    new THREE.CircleGeometry(80, 64),
    new THREE.MeshStandardMaterial({ color: 0x14141b, roughness: 0.9 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.01;
  floor.receiveShadow = true;
  viewerScene.add(floor);

  // Grid
  const grid = new THREE.GridHelper(160, 32, 0x2a2a38, 0x20202b);
  grid.position.y = 0;
  viewerScene.add(grid);

  viewerControls = new OrbitControls(viewerCamera, canvas);
  viewerControls.enableDamping = true;
  viewerControls.dampingFactor = 0.08;
  viewerControls.target.set(0, 10, 0);

  function tick() {
    viewerAnimId = requestAnimationFrame(tick);
    viewerControls.update();
    viewerRenderer.render(viewerScene, viewerCamera);
  }
  tick();

  // Handle resize
  const ro = new ResizeObserver(() => {
    if (!viewerRenderer || !viewerCamera) return;
    const cw = canvas.clientWidth, ch = canvas.clientHeight;
    viewerCamera.aspect = cw / ch;
    viewerCamera.updateProjectionMatrix();
    viewerRenderer.setSize(cw, ch, false);
  });
  ro.observe(canvas);
}

function setViewerModel(spec) {
  if (!viewerScene) return;
  if (viewerGroup) viewerScene.remove(viewerGroup);
  viewerGroup = buildThreeGroupFromSpec(spec);

  // Auto-frame: compute bounding box and recenter camera
  const box = new THREE.Box3().setFromObject(viewerGroup);
  const size = box.getSize(new THREE.Vector3()).length();
  const center = box.getCenter(new THREE.Vector3());
  viewerControls.target.copy(center);
  const dist = Math.max(40, size * 1.8);
  viewerCamera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
  viewerCamera.near = size / 100; viewerCamera.far = size * 10; viewerCamera.updateProjectionMatrix();
  viewerScene.add(viewerGroup);
}

function modelFilename(ext) {
  const base = (lastSpec?.name || "knox-forge").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "knox-forge";
  return `${base}-${Date.now()}.${ext}`;
}
function exportSTL() {
  if (!viewerGroup) return alert("Generate something first");
  const exp = new STLExporter();

// Real 3MF export — produces a properly-zipped .3mf file with the 3D Manufacturing
// Format manifest. Bambu Studio, OrcaSlicer, Cura, PrusaSlicer all natively
// open .3mf files (it's the modern preferred format vs STL).
function export3MF() {
  if (!viewerGroup) return alert("Generate something first");
  try {
    // Collect every triangle from the merged geometry
    const vertices = []; // flat array of {x,y,z}
    const triangles = []; // [v1Idx, v2Idx, v3Idx]
    const vertexMap = new Map(); // dedupe shared vertices by quantized key
    function addVertex(x, y, z) {
      const key = `${x.toFixed(4)},${y.toFixed(4)},${z.toFixed(4)}`;
      if (vertexMap.has(key)) return vertexMap.get(key);
      const idx = vertices.length;
      vertices.push({ x, y, z });
      vertexMap.set(key, idx);
      return idx;
    }
    viewerGroup.traverse((obj) => {
      if (!obj.isMesh) return;
      const geom = obj.geometry;
      const pos = geom.attributes.position;
      const idx = geom.index;
      obj.updateMatrixWorld(true);
      const m = obj.matrixWorld;
      const v = new THREE.Vector3();
      const triCount = idx ? idx.count / 3 : pos.count / 3;
      for (let t = 0; t < triCount; t++) {
        const ids = idx ? [idx.getX(3*t), idx.getX(3*t+1), idx.getX(3*t+2)] : [3*t, 3*t+1, 3*t+2];
        const indices = ids.map(i => {
          v.set(pos.getX(i), pos.getY(i), pos.getZ(i));
          v.applyMatrix4(m);
          return addVertex(v.x, v.y, v.z);
        });
        triangles.push(indices);
      }
    });

    // Build 3D/3dmodel.model XML
    let xml = `<?xml version="1.0" encoding="UTF-8"?>
<model unit="millimeter" xml:lang="en-US" xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02">
<resources>
<object id="1" type="model">
<mesh>
<vertices>
`;
    for (const v of vertices) xml += `<vertex x="${v.x.toFixed(4)}" y="${v.y.toFixed(4)}" z="${v.z.toFixed(4)}"/>\n`;
    xml += `</vertices>\n<triangles>\n`;
    for (const t of triangles) xml += `<triangle v1="${t[0]}" v2="${t[1]}" v3="${t[2]}"/>\n`;
    xml += `</triangles>\n</mesh>\n</object>\n</resources>\n<build>\n<item objectid="1"/>\n</build>\n</model>\n`;

    const contentTypes = `<?xml version="1.0" encoding="UTF-8"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml"/>
</Types>
`;
    const rels = `<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Target="/3D/3dmodel.model" Id="rel-1" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel"/>
</Relationships>
`;

    // Build the zip in-memory (fflate is synchronous + fast)
    const zipped = zipSync({
      "[Content_Types].xml": strToU8(contentTypes),
      "_rels/.rels": strToU8(rels),
      "3D/3dmodel.model": strToU8(xml),
    });
    downloadBlob(modelFilename("3mf"), new Blob([zipped], { type: "model/3mf" }));
    showToast("Saved as real .3mf — Bambu Studio's preferred format.", 4000);
  } catch (err) {
    console.error("3MF export failed:", err);
    showToast("3MF export failed: " + (err.message || "unknown") + ". Falling back to STL.", 5000);
    exportSTL();
  }
}

// ============================================================
// Send to specific apps — Path A: Web Share API (Windows 11+/macOS 13+)
// opens the OS native share sheet which lists installed apps that can
// handle .stl files (Bambu Studio, OrcaSlicer, Cura, etc.). Pick once,
// the OS remembers. True one-click open after first setup.
// Fallback: download with clear drag-drop instructions.
// ============================================================
async function sendToApp(app) {
  if (!viewerGroup) return alert("Generate something first");
  // 1) If the Forge Desktop Helper is installed, use it — true 1-click open.
  //    The helper handles knox-forge://send?app=<app>&stl=<base64> protocol URLs.
  //    Detection trick: try to navigate to a knox-forge:// URL and listen for blur.
  //    If the helper is installed, the OS opens it and our tab loses focus briefly.
  if (await tryDesktopHelper(app)) return;

  // 2) Fall back to Web Share API + downloaded file (the original Path A)
  const apps = {
    bambu: {
      name: "Bambu Studio",
      web: "https://bambulab.com/en/download/studio",
      hint: "Tip: in the share sheet, pick Bambu Studio. Windows/macOS will remember it next time.",
      fallback: "STL saved to your Downloads folder. Open Bambu Studio and drag the file onto the build plate (or File → Import → STL).",
    },
    orca: {
      name: "OrcaSlicer",
      web: "https://github.com/SoftFever/OrcaSlicer/releases",
      hint: "Tip: in the share sheet, pick OrcaSlicer.",
      fallback: "STL saved to your Downloads folder. Open OrcaSlicer and drag the file onto the build plate.",
    },
    cura: {
      name: "Cura",
      web: "https://ultimaker.com/software/ultimaker-cura/",
      hint: "Tip: in the share sheet, pick Cura.",
      fallback: "STL saved to your Downloads folder. Open Cura and drag the file onto the build plate.",
    },
    blender: {
      name: "Blender",
      web: "https://www.blender.org/download/",
      hint: "Tip: in the share sheet, pick Blender.",
      fallback: "STL saved to your Downloads folder. In Blender: File → Import → STL.",
    },
    fusion: {
      name: "Fusion 360",
      web: "https://www.autodesk.com/products/fusion-360/",
      hint: "Tip: in the share sheet, pick Fusion 360.",
      fallback: "STL saved to your Downloads folder. In Fusion 360: Insert → Insert Mesh.",
    },
  };
  const cfg = apps[app];
  if (!cfg) return;

  // Build STL blob in-memory
  const exp = new STLExporter();
  const stlText = exp.parse(viewerGroup, { binary: false });
  const filename = modelFilename("stl");
  const file = new File([stlText], filename, { type: "model/stl" });

  // Try Web Share API Level 2 (with files). Only works on https + supports + user gesture.
  const canShareFile = typeof navigator !== "undefined"
    && typeof navigator.canShare === "function"
    && typeof navigator.share === "function"
    && navigator.canShare({ files: [file] });

  if (canShareFile) {
    try {
      await navigator.share({
        files: [file],
        title: lastSpec?.name || "Forge model",
        text: `Open this 3D model in ${cfg.name}`,
      });
      // Share sheet opened. Some OSes still also save a copy; show the hint.
      showToast(cfg.hint, 5000);
      return;
    } catch (err) {
      // User canceled the share sheet (AbortError) — silent. Other errors fall through.
      if (err && err.name === "AbortError") return;
      // Otherwise fall through to download fallback
    }
  }

  // Fallback: download + clear instructions
  downloadBlob(filename, stlText, "model/stl");
  showToast(cfg.fallback, 9000, cfg.web);
}

// Try to launch Forge Desktop Helper via knox-forge:// protocol.
// Returns true if the helper was likely invoked (browser lost focus).
// If the helper isn't installed, the browser does nothing and we fall through.
async function tryDesktopHelper(app) {
  if (!viewerGroup) return false;
  // Build the STL as base64 — URI-safe via Uint8Array → btoa
  const exp = new STLExporter();
  const stlText = exp.parse(viewerGroup, { binary: false });
  // base64-encode the STL text safely
  let stlB64;
  try {
    stlB64 = btoa(unescape(encodeURIComponent(stlText)));
  } catch (e) {
    return false;
  }
  // Hard cap: protocol URLs have a length limit (~2KB on Windows). Big models
  // would exceed it. Above 1.5MB of base64 we skip helper and fall to download.
  if (stlB64.length > 1_500_000) return false;

  const safeName = (lastSpec?.name || "knox-forge").toLowerCase().replace(/[^a-z0-9]+/g, "-").slice(0, 40);
  const protoUrl = `knox-forge://send?app=${encodeURIComponent(app)}&name=${encodeURIComponent(safeName)}&stl=${encodeURIComponent(stlB64)}`;

  // Detect helper presence via blur event after firing the URL.
  // If the helper exists, the OS launches it and our window briefly loses focus.
  return new Promise((resolve) => {
    let blurred = false;
    const onBlur = () => { blurred = true; };
    window.addEventListener("blur", onBlur, { once: true });

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = protoUrl;
    document.body.appendChild(iframe);

    setTimeout(() => {
      window.removeEventListener("blur", onBlur);
      try { iframe.remove(); } catch {}
      if (blurred) {
        showToast(`Sent to ${app}. The app should open with your model loaded.`, 5000);
        resolve(true);
      } else {
        // Helper not installed — caller will fall back to Web Share / download
        resolve(false);
      }
    }, 800);
  });
}

// Toast with optional variant (success | warn | error | info default)
function showToast(msg, ms = 3000, helpUrl = null, variant = "info") {
  let host = document.getElementById("forge-toast");
  if (!host) {
    host = document.createElement("div");
    host.id = "forge-toast";
    host.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:12px 18px;border-radius:12px;font-size:13px;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,0.4);max-width:520px;text-align:center;line-height:1.4;display:none;border:1px solid";
    document.body.appendChild(host);
  }
  const variants = {
    info:    { bg: "var(--card)", border: "var(--border)", color: "var(--text)" },
    success: { bg: "rgba(34,197,94,0.12)", border: "rgba(34,197,94,0.45)", color: "#86efac" },
    warn:    { bg: "rgba(245,158,11,0.12)", border: "rgba(245,158,11,0.45)", color: "#fcd34d" },
    error:   { bg: "rgba(239,68,68,0.12)", border: "rgba(239,68,68,0.45)", color: "#fca5a5" },
  };
  const v = variants[variant] || variants.info;
  host.style.background = v.bg;
  host.style.borderColor = v.border;
  host.style.color = v.color;
  host.innerHTML = helpUrl
    ? `${escapeHtml(msg)}<br><a href="${helpUrl}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;font-size:12px">Don't have it? Get it here ↗</a>`
    : escapeHtml(msg);
  host.style.display = "block";
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { host.style.display = "none"; }, ms);
}

// Custom branded confirm dialog — replaces window.confirm()
function forgeConfirm(message, opts = {}) {
  return new Promise((resolve) => {
    const modal = document.createElement("div");
    modal.className = "forge-modal";
    modal.innerHTML = `
      <div class="forge-modal-card" style="max-width:420px">
        <div class="forge-modal-title">${escapeHtml(opts.title || "Confirm")}</div>
        <div style="font-size:14px;color:var(--text);line-height:1.55;margin-top:8px;margin-bottom:18px">${escapeHtml(message)}</div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-secondary" id="cf-cancel" style="width:auto;padding:9px 18px;font-size:13px">${escapeHtml(opts.cancelLabel || "Cancel")}</button>
          <button class="btn btn-primary ${opts.danger ? "danger" : ""}" id="cf-ok" style="width:auto;padding:9px 18px;font-size:13px">${escapeHtml(opts.okLabel || "OK")}</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    const cleanup = (v) => { modal.remove(); document.removeEventListener("keydown", onKey); resolve(v); };
    const onKey = (e) => {
      if (e.key === "Escape") cleanup(false);
      if (e.key === "Enter") cleanup(true);
    };
    document.addEventListener("keydown", onKey);
    modal.addEventListener("click", (e) => { if (e.target === modal) cleanup(false); });
    document.getElementById("cf-cancel").addEventListener("click", () => cleanup(false));
    document.getElementById("cf-ok").addEventListener("click", () => cleanup(true));
    setTimeout(() => document.getElementById("cf-ok")?.focus(), 50);
  });
}

// Centralized fetch wrapper with friendly error messages + retry
async function fetchAPI(url, options = {}, opts = {}) {
  const maxRetries = opts.retries ?? 1;
  let lastErr;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    try {
      const r = await fetch(url, options);
      const ct = r.headers.get("content-type") || "";
      const j = ct.includes("application/json") ? await r.json() : { ok: r.ok, text: await r.text() };
      if (!r.ok || j.ok === false) {
        throw new Error(j.error || `${r.status} ${r.statusText}`);
      }
      return j;
    } catch (e) {
      lastErr = e;
      if (attempt < maxRetries) await new Promise(r => setTimeout(r, 700 * (attempt + 1)));
    }
  }
  // Friendly error mapping
  const msg = lastErr?.message || "Unknown error";
  if (/Failed to fetch|NetworkError|ERR_NETWORK/i.test(msg)) {
    throw new Error("Can't reach Forge servers. Check your internet and try again.");
  }
  if (/429/.test(msg)) {
    throw new Error("Whoa — too many requests in a short window. Wait a few seconds.");
  }
  if (/AI not configured/.test(msg)) {
    throw new Error("AI is offline right now. Try again in a minute.");
  }
  throw lastErr;
}

// Compute volume (mm³) of one primitive part. Treats subtract as negative.
function partVolume(p) {
  const kind = (p.kind || "box").toLowerCase();
  let v = 0;
  if (kind === "box" || kind === "cube") {
    const s = p.size || [10, 10, 10];
    v = (s[0] || 0) * (s[1] || 0) * (s[2] || 0);
  } else if (kind === "sphere") {
    const r = p.radius || 0;
    v = (4 / 3) * Math.PI * Math.pow(r, 3);
  } else if (kind === "cylinder") {
    const r = p.radius || 0;
    const h = (p.size && p.size[1]) || p.height || 0;
    v = Math.PI * r * r * h;
  } else if (kind === "cone") {
    const r = p.radius || 0;
    const h = (p.size && p.size[1]) || p.height || 0;
    v = (1 / 3) * Math.PI * r * r * h;
  } else if (kind === "torus") {
    const R = p.radius || 0;
    const t = p.tube || 0;
    v = 2 * Math.PI * Math.PI * R * t * t;
  } else if (kind === "polyprism" || kind === "polygonprism") {
    const r = p.radius || 0;
    const h = (p.size && p.size[1]) || p.height || 0;
    const sides = Math.max(3, Math.min(32, p.sides || 6));
    // Regular polygon area = 0.5 × n × r² × sin(2π/n)
    const area = 0.5 * sides * r * r * Math.sin((2 * Math.PI) / sides);
    v = area * h;
  } else if (kind === "extrude") {
    const outline = Array.isArray(p.outline) ? p.outline : [];
    const h = (p.size && p.size[1]) || p.height || 0;
    if (outline.length >= 3) {
      // Shoelace for arbitrary polygon
      let area = 0;
      for (let i = 0; i < outline.length; i++) {
        const j = (i + 1) % outline.length;
        area += (outline[i][0] || 0) * (outline[j][1] || 0);
        area -= (outline[j][0] || 0) * (outline[i][1] || 0);
      }
      v = Math.abs(area) * 0.5 * h;
    }
  }
  return (p.op === "subtract" || p.op === "sub") ? -v : v;
}

function specTotalVolumeMm3(spec) {
  const parts = (spec && spec.parts) || [];
  let total = 0;
  for (const p of parts) total += partVolume(p);
  return Math.max(0, total);
}

function estimatePrint(spec) {
  if (!spec) return null;
  const printer = getPrinterProfile();
  const material = getMaterial();
  const volMm3 = specTotalVolumeMm3(spec);
  const volCm3 = volMm3 / 1000;
  const weightG = volCm3 * material.density;
  const cost = (weightG / 1000) * material.costPerKg;
  // Filament length estimate (1.75mm filament, area = π × 0.875² ≈ 2.405 mm²)
  const filamentLengthM = volMm3 / 2.405 / 1000;

  let timeMinutes = null;
  if (printer && printer.flowRate > 0) {
    // Pure extrusion time
    const extrusionSec = volMm3 / printer.flowRate;
    // Add overhead: travel + heating + retracts + slowing on perimeters
    const overhead = printer.multiplier || 1.2;
    timeMinutes = (extrusionSec * overhead) / 60;
  } else if (printer && printer.resin) {
    // Rough resin estimate: 5 sec per layer + flow time
    const heightMm = (spec.parts || []).reduce((m, p) => Math.max(m, (p.position?.[1] || 0) + ((p.size?.[1] || p.height || 0) / 2)), 0);
    const layers = Math.max(1, Math.ceil(heightMm / (printer.layerHeight || 0.05)));
    timeMinutes = (layers * 7) / 60;
  }
  return { volMm3, volCm3, weightG, cost, filamentLengthM, timeMinutes, printer, material };
}

function formatTime(mins) {
  if (!isFinite(mins) || mins <= 0) return "—";
  if (mins < 60) return `${Math.round(mins)} min`;
  const h = Math.floor(mins / 60);
  const m = Math.round(mins - h * 60);
  return `${h}h ${m}m`;
}

function renderPrintInfo(spec) {

function getSavedModels() { try { return JSON.parse(localStorage.getItem(FORGE_MODELS_KEY) || "[]"); } catch { return []; } }
function captureViewerThumbnail() {
  // Snapshot the current viewer to a small data URL for the My Models page.
  // Returns null if no model is currently visible.
  try {
    if (!viewerRenderer || !viewerScene || !viewerCamera) return null;
    viewerRenderer.render(viewerScene, viewerCamera);
    const fullCanvas = viewerRenderer.domElement;
    const tmp = document.createElement("canvas");
    tmp.width = 320; tmp.height = 240;
    const ctx = tmp.getContext("2d");
    ctx.fillStyle = "#10101a";
    ctx.fillRect(0, 0, tmp.width, tmp.height);
    // Draw the renderer canvas scaled to fit
    ctx.drawImage(fullCanvas, 0, 0, tmp.width, tmp.height);
    return tmp.toDataURL("image/jpeg", 0.78);
  } catch { return null; }
}
function saveModel(spec, prompt) {
  const all = getSavedModels();
  const thumbnail = captureViewerThumbnail();
  // feat #8: Auto-suggest tags based on prompt + name
  const modelObj = { name: spec.name || "Untitled", prompt: prompt || "" };
  const tags = inferModelTags(modelObj);
  const id = Date.now();
  spec._savedId = id; // track for download counter
  all.unshift({ id, name: spec.name || "Untitled", spec, prompt, savedAt: new Date().toISOString(), thumbnail, tags });
  // Cap at 50 saved models — thumbnails take ~15KB each so 50 = ~750KB, fits localStorage
  const capped = all.slice(0, 50);
  localStorage.setItem(FORGE_MODELS_KEY, JSON.stringify(capped));
  // Fire-and-forget cloud sync
  syncModelsToCloud(capped).catch(() => {});
  return id;
}
function deleteSavedModel(id) {
  const all = getSavedModels().filter((m) => m.id !== id);
  localStorage.setItem(FORGE_MODELS_KEY, JSON.stringify(all));
  syncModelsToCloud(all).catch(() => {});
}

function showCloudStatus(state, msg) {
  let host = document.getElementById("cloud-status");
  if (!host) {
    host = document.createElement("div");
    host.id = "cloud-status";
    host.className = "cloud-status";
    document.body.appendChild(host);
  }
  host.className = "cloud-status visible " + state;
  host.textContent = msg;
  if (state === "synced") {
    clearTimeout(host._t);
    host._t = setTimeout(() => { host.classList.remove("visible"); }, 2500);
  }
}

// Auto-tag a model based on name/prompt keywords
function inferModelTags(model) {
  const text = ((model.name || "") + " " + (model.prompt || "")).toLowerCase();
  const tags = [];
  if (/phone|case|cradle|stand.*phone/.test(text)) tags.push("phone");
  if (/pencil|pen|writing/.test(text)) tags.push("desk");
  if (/cable|wire|cord|usb/.test(text)) tags.push("cable");
  if (/coaster|cup|mug|drink/.test(text)) tags.push("drink");
  if (/planter|plant|pot|vase/.test(text)) tags.push("plant");
  if (/hook|hanger|mount|bracket/.test(text)) tags.push("mount");
  if (/box|case|container|storage/.test(text)) tags.push("storage");
  if (/hinge|joint|articulate/.test(text)) tags.push("mechanical");
  if (/tpu|flexible|soft/.test(text)) tags.push("tpu");
  if (/resin|sla|fine/.test(text)) tags.push("resin");
  if (/toy|fun|fidget/.test(text)) tags.push("toy");
  if (/gear|cog|threaded/.test(text)) tags.push("mechanical");
  return tags;
}

async function syncModelsToCloud(models) {
  const session = getSession();
  if (!session?.id) return;
  showCloudStatus("syncing", "☁ syncing…");
  // Strip thumbnails before sending — they bloat the payload massively.
  // We keep thumbnails local-only; on a fresh device they get regenerated
  // when the user re-opens a model in Forge.
  const slim = (models || []).map(m => ({
    id: m.id, name: m.name, spec: m.spec, prompt: m.prompt, savedAt: m.savedAt,
  }));
  try {
    // Fetch the current profile so we don't clobber other data fields
    const r = await fetch(`${NEXUS_API_BASE}/api/users?id=${encodeURIComponent(session.id)}`);
    const j = await r.json();
    const profile = (j && j.profile) || {};
    const newProfile = { ...profile, data: { ...(profile.data || {}), forgeModels: slim, forgeModelsSyncedAt: new Date().toISOString() } };
    await fetch(`${NEXUS_API_BASE}/api/users`, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ id: session.id, profile: newProfile }),
    });
    showCloudStatus("synced", "☁ synced");
  } catch {
    showCloudStatus("error", "☁ offline (saved locally)");
  }
}

async function loadModelsFromCloud() {
  const session = getSession();
  if (!session?.id) return;
  try {
    const r = await fetch(`${NEXUS_API_BASE}/api/users?id=${encodeURIComponent(session.id)}`);
    const j = await r.json();
    const cloudModels = j?.profile?.data?.forgeModels || [];
    if (!Array.isArray(cloudModels) || cloudModels.length === 0) return;
    // Merge with local: keep cloud as the source of truth for spec/prompt,
    // but preserve any locally-stored thumbnails by matching on id.
    const local = getSavedModels();
    const byId = Object.fromEntries(local.map(m => [m.id, m]));
    const merged = cloudModels.map(c => ({
      ...c,
      thumbnail: byId[c.id]?.thumbnail || null, // local-only field
    }));
    localStorage.setItem(FORGE_MODELS_KEY, JSON.stringify(merged.slice(0, 50)));
  } catch {
    // Cloud unreachable — stay with local cache
  }
}

async function chatAssistant(history) {
  const r = await fetch(`${NEXUS_API_BASE}/api/ai/forge-chat`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({
      history: history.map(m => ({
        role: m.role === "user" ? "user" : "assistant",
        content: String(m.content || ""),
      })),
    }),
  });
  let j;
  try { j = await r.json(); } catch { j = {}; }
  if (!r.ok) {
    const msg = j && j.error ? j.error : `Assistant unavailable (${r.status})`;
    return `Sorry — ${msg}. Try again in a moment.`;
  }
  let reply = j && (j.reply || j.text || j.message);
  if (!reply && typeof j === "string") reply = j;
  if (!reply) reply = "Sorry, I couldn't generate a response. Try again?";
  return reply;
}

function inferSlicerTips(prompt) {
  const t = (prompt || "").toLowerCase();
  const tips = [];
  if (/container|box|case|storage|organizer/.test(t)) {
    tips.push("Print with the opening face-down on the bed to avoid supports inside.");
    tips.push("Use 3 perimeters for rigid walls at 0.2mm layer height.");
  }
  if (/phone|stand|cradle/.test(t)) {
    tips.push("Orient the widest face flat on the bed for best layer adhesion.");
    tips.push("Enable supports under any overhanging lips or cable slots.");
  }
  if (/flexible|tpu|soft/.test(t)) {
    tips.push("Use TPU material — reduce retraction to 1mm and print slowly at 25 mm/s.");
  }
  if (/hook|hanger|mount|bracket/.test(t)) {
    tips.push("Set infill to 40%+ and use 4 perimeters for maximum load strength.");
    tips.push("Print vertically so layer lines run parallel to the hook's load direction.");
  }
  if (/gear|mechanical|joint|hinge/.test(t)) {
    tips.push("Use 0.1mm layers and 40%+ infill for precise fit and durability.");
    tips.push("PETG or ABS preferred over PLA for wear resistance.");
  }
  if (/vase|planter|pot/.test(t)) {
    tips.push("Consider Vase Mode (spiralize outer contour) for thin-walled planters — saves time and material.");
    tips.push("Add a drain hole or print a separate drainage tray.");
  }
  if (/lamp|light/.test(t)) {
    tips.push("Use 0% infill with 2 walls for translucent light diffusion on light-colored PETG.");
    tips.push("Leave wiring channel clearance of at least 8mm diameter.");
  }
  // Default tips if nothing matched
  if (tips.length === 0) {
    tips.push("Use 20% gyroid infill for a good strength-to-weight ratio.");
    tips.push("0.2mm layer height is the best general-purpose setting for most models.");
    tips.push("Add a brim (5-8mm) if the model has small contact area with the bed.");
  }
  return tips.slice(0, 3);
}

// Model complexity indicator (feat #17)
function getComplexity(spec) {
  if (!spec || !spec.parts) return null;
  const parts = spec.parts.length;
  const hasSubtracts = spec.parts.some(p => p.op === "subtract" || p.op === "sub");
  if (parts <= 2 && !hasSubtracts) return "simple";
  if (parts <= 6) return "moderate";
  return "complex";
}

// STL size estimate (feat #22)
function estimateStlSizeKb(spec) {
  if (!spec || !spec.parts) return null;
  const parts = spec.parts.length;
  // Rough: each part ~15-40KB of STL data depending on geometry
  const avgPerPart = 25;
  return Math.max(5, parts * avgPerPart);
}

// Get real-world dimensions from bounding box (feat #5)
function getModelDimensionsMm() {
  if (!viewerGroup) return null;
  const box = new THREE.Box3().setFromObject(viewerGroup);
  const size = box.getSize(new THREE.Vector3());
  // Scale factor: Three.js units ≈ mm in our spec
  const w = Math.round(size.x * _forgeScale);
  const d = Math.round(size.z * _forgeScale);
  const h = Math.round(size.y * _forgeScale);
  return { w, d, h };
}

// feat #3: Apply filament color as canvas background tint
function applyFilamentColorTint() {
  const canvas = document.getElementById("viewer-canvas");
  if (!canvas || !activeFilamentColor) return;

  const hex = activeFilamentColor.hex;
  canvas.style.boxShadow = `inset 0 0 40px ${hex}18`;
}

// feat #7: Per-model notes storage
function getModelNotes(spec) {
  if (!spec) return "";
  const key = `forge:notes-${spec.name || "model"}`;
  const saved = localStorage.getItem(key);
  if (saved) return saved;
  // Pre-populate with tips based on category
  const prompt = lastPrompt || "";
  const t = prompt.toLowerCase();
  if (/container|box|case/.test(t)) return "Use 20% infill, 0.2mm layer height, 3 walls. Print opening face-down.";
  if (/phone|stand/.test(t)) return "15% infill OK. Orient widest face to bed. Add brim for stability.";
  if (/mechanical|gear|joint/.test(t)) return "40%+ infill, 4 walls, 0.15mm layers for precision. PETG or ABS preferred.";
  if (/flexible|tpu/.test(t)) return "TPU: 1mm retraction, 25mm/s, no cooling. Direct drive extruder recommended.";
  return "Use 20% infill, 0.2mm layer height. Add a brim if base area is small.";
}
function saveModelNotes(spec, text) {
  if (!spec) return;
  const key = `forge:notes-${spec.name || "model"}`;
  localStorage.setItem(key, text);
}

// feat #9: Toggle grid visibility

function toggleGrid() {
  _gridVisible = !_gridVisible;
  if (!viewerScene) return;
  viewerScene.traverse(obj => {
    if (obj.isGridHelper) obj.visible = _gridVisible;
  });
  showToast(_gridVisible ? "Grid ON" : "Grid OFF", 1200, null, "info");
}

// feat #9: Fullscreen viewer
function toggleFullscreenViewer() {
  const canvas = document.getElementById("viewer-canvas");

}

        </div>

          <div class="compare-pane-label">Refined: ${escapeHtml(lastSpec.name || "Untitled")}</div>
          <canvas id="compare-canvas-b" style="width:100%;height:280px;display:block"></canvas>

    initMiniViewer(document.getElementById("compare-canvas-a"), compareOriginalSpec);
    initMiniViewer(document.getElementById("compare-canvas-b"), lastSpec);
  }, 50);
}

function initMiniViewer(canvas, spec) {
  if (!canvas || !spec) return;
  const w = canvas.clientWidth || 400, h = canvas.clientHeight || 280;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 5000);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  renderer.setSize(w, h, false);
  renderer.shadowMap.enabled = true;
  scene.add(new THREE.HemisphereLight(0xb4baff, 0x202030, 0.6));
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(50, 80, 30);
  scene.add(dir);
  const grid = new THREE.GridHelper(160, 32, 0x2a2a38, 0x20202b);
  scene.add(grid);
  const group = buildThreeGroupFromSpec(spec);
  const box = new THREE.Box3().setFromObject(group);
  const size = box.getSize(new THREE.Vector3()).length() || 100;
  const center = box.getCenter(new THREE.Vector3());
  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.target.copy(center);
  const dist = Math.max(40, size * 1.8);
  camera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
  scene.add(group);
  function tick() {
    requestAnimationFrame(tick);
    controls.update();
    renderer.render(scene, camera);
  }
  tick();
}

let _forgeScale = 1.0;

}

function autoOrientModel() {
  if (!viewerGroup || !lastSpec) return alert("Generate something first");
  // Heuristic: rotate the model so its longest dimension lies flat on the bed.
  // Computes the bounding box, finds the LARGEST face, rotates so that face = bottom.
  const box = new THREE.Box3().setFromObject(viewerGroup);
  const size = box.getSize(new THREE.Vector3());
  // Three faces: XY (bottom area = x*y), XZ (=x*z), YZ (=y*z)
  const faceXZ = size.x * size.z; // current "bottom" (Y is up)
  const faceXY = size.x * size.y;
  const faceYZ = size.y * size.z;
  let rot = [0, 0, 0];
  let suggestion = "";
  if (faceXZ >= faceXY && faceXZ >= faceYZ) {
    suggestion = "Already oriented well — largest flat face is already on the print bed.";
  } else if (faceXY >= faceYZ) {
    rot = [Math.PI / 2, 0, 0];
    suggestion = "Rotated 90° around X — the X-Y face is now on the bed (was facing forward). Better print stability + less support material.";
  } else {
    rot = [0, 0, Math.PI / 2];
    suggestion = "Rotated 90° around Z — the Y-Z face is now on the bed (was facing right). Better print stability.";
  }
  viewerGroup.rotation.set(rot[0], rot[1], rot[2]);
  showToast(suggestion, 5000, null, "info");
}

function setCameraPreset(preset) {
  if (!viewerControls || !viewerCamera || !viewerGroup) return;
  const box = new THREE.Box3().setFromObject(viewerGroup);
  const size = box.getSize(new THREE.Vector3()).length() || 100;
  const center = box.getCenter(new THREE.Vector3());
  const dist = size * 1.6;
  const positions = {
    iso:   [center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7],
    top:   [center.x, center.y + dist, center.z + 0.001],
    front: [center.x, center.y, center.z + dist],
    side:  [center.x + dist, center.y, center.z],
  };
  const p = positions[preset] || positions.iso;
  viewerCamera.position.set(p[0], p[1], p[2]);
  viewerControls.target.copy(center);
  viewerControls.update();
}

let animationHelpers = [];
let animationRAF = null;

async function playSeeInAction() {
  if (!lastSpec) return alert("Generate something first");

    });

    await runAnimation(j);

  } finally {
    btn.disabled = false;
    btn.innerHTML = `↻ <span style="margin-left:6px">Replay</span>`;

}

function clearAnimation() {
  if (animationRAF) cancelAnimationFrame(animationRAF);
  animationRAF = null;
  for (const m of animationHelpers) viewerScene?.remove(m);
  animationHelpers = [];
  const cap = document.getElementById("anim-caption");
  if (cap) { cap.style.display = "none"; cap.innerText = ""; }
}

function buildHelperMesh(h) {
  let geom;
  const kind = (h.kind || "box").toLowerCase();
  if (kind === "box") {
    const s = h.size || [10, 10, 10];
    geom = new THREE.BoxGeometry(s[0] || 10, s[1] || 10, s[2] || 10);
  } else if (kind === "sphere") {
    geom = new THREE.SphereGeometry(h.radius || 10, 24, 16);
  } else if (kind === "cylinder") {
    geom = new THREE.CylinderGeometry(h.radius || 10, h.radius || 10, h.height || 30, 24);
  } else if (kind === "polyprism") {
    geom = new THREE.CylinderGeometry(h.radius || 10, h.radius || 10, h.height || 30, Math.max(3, Math.min(32, h.sides || 6)));
  } else {
    const s = h.size || [10, 10, 10];
    geom = new THREE.BoxGeometry(s[0] || 10, s[1] || 10, s[2] || 10);
  }
  const mat = new THREE.MeshStandardMaterial({ color: h.color || "#888888", roughness: 0.6, metalness: 0.1, transparent: true, opacity: 0.92 });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.userData.label = h.label || "";
  return mesh;
}

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

async function runAnimation(script) {
  clearAnimation();
  if (!viewerScene) return;
  const helperById = {};
  for (const h of (script.helpers || [])) {
    const mesh = buildHelperMesh(h);
    mesh.visible = false;
    viewerScene.add(mesh);
    animationHelpers.push(mesh);
    helperById[h.id] = mesh;
  }
  const caption = document.getElementById("anim-caption");
  const startedAt = performance.now();
  const totalDuration = script.duration || 6000;

  return new Promise((resolve) => {
    function tick() {
      const now = performance.now();
      const elapsed = now - startedAt;
      let currentCaption = "";

      for (const step of (script.steps || [])) {
        const m = helperById[step.helperId];
        if (!m) continue;
        const stepStart = step.startAt || 0;
        const stepDur = step.duration || 1500;
        if (elapsed < stepStart) continue;
        if (elapsed > stepStart + stepDur) {
          if (step.toPosition) m.position.set(step.toPosition[0] || 0, step.toPosition[1] || 0, step.toPosition[2] || 0);
          if (step.toRotation) m.rotation.set(THREE.MathUtils.degToRad(step.toRotation[0] || 0), THREE.MathUtils.degToRad(step.toRotation[1] || 0), THREE.MathUtils.degToRad(step.toRotation[2] || 0));
          m.visible = true;
          continue;
        }
        m.visible = true;
        currentCaption = step.caption || currentCaption;
        const t = easeInOut(Math.min(1, Math.max(0, (elapsed - stepStart) / stepDur)));
        const from = step.fromPosition || [0, 0, 0];
        const to = step.toPosition || from;
        m.position.set(from[0] + (to[0] - from[0]) * t, from[1] + (to[1] - from[1]) * t, from[2] + (to[2] - from[2]) * t);
        if (step.fromRotation && step.toRotation) {
          const fr = step.fromRotation, tr = step.toRotation;
          m.rotation.set(
            THREE.MathUtils.degToRad(fr[0] + (tr[0] - fr[0]) * t),
            THREE.MathUtils.degToRad(fr[1] + (tr[1] - fr[1]) * t),
            THREE.MathUtils.degToRad(fr[2] + (tr[2] - fr[2]) * t)
          );
        }
      }

      if (caption) {
        if (currentCaption) { caption.innerText = currentCaption; caption.style.display = "block"; }
      }
      if (elapsed < totalDuration) {
        animationRAF = requestAnimationFrame(tick);
      } else {
        animationRAF = null;
        if (caption) caption.innerText = `${script.title || "Demo complete"} — click Replay to watch again`;
        resolve();
      }
    }
    animationRAF = requestAnimationFrame(tick);
  });
}

let scanStream = null;
let scanLastPhoto = null;
let scanBatchPhotos = [];
let scanRecorder = null;
let scanRecordChunks = [];
let scanMode = "single";

async function startScanCamera(videoEl) {
  if (scanStream) { for (const t of scanStream.getTracks()) t.stop(); scanStream = null; }
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    videoEl.srcObject = scanStream;
    await videoEl.play().catch(() => {});
  } catch (err) { throw err; }
}

function stopScanCamera() {
  if (scanStream) { for (const t of scanStream.getTracks()) t.stop(); scanStream = null; }
}

function captureScanPhoto(videoEl) {
  const canvas = document.createElement("canvas");
  const vw = videoEl.videoWidth || 1280, vh = videoEl.videoHeight || 720;
  canvas.width = vw; canvas.height = vh;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(videoEl, 0, 0, vw, vh);
  const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
  const m = dataUrl.match(/^data:(image\/[a-z+]+);base64,(.+)$/);
  if (!m) return null;
  return { mime: m[1], base64: m[2], dataUrl };
}

async function scanGenerateFromImages(images, hint) {
  if (!images || images.length === 0) throw new Error("No images to send");
  const endpoint = images.length === 1 ? "/api/ai/forge-model" : "/api/ai/forge-scan";
  const body = images.length === 1
    ? { input: hint || "Identify the object in this photo and generate a 3D-printable model that matches its shape and real-world dimensions.", presets: ["model"], imageBase64: images[0].base64, imageMimeType: images[0].mime || "image/jpeg" }
    : { imagesBase64: images.map(i => i.base64), hint: hint || "" };
  const r = await fetch(`${NEXUS_API_BASE}${endpoint}`, {
    method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body),
  });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || `Scan failed (${r.status})`);
  if (!j.parts || !Array.isArray(j.parts) || j.parts.length === 0) throw new Error("AI returned an empty model — try better/more angles");
  return j;
}

async function extractVideoFrames(blob, targetCount = 12) {
  return new Promise((resolve, reject) => {
    const video = document.createElement("video");
    video.muted = true; video.playsInline = true;
    video.src = URL.createObjectURL(blob);
    video.addEventListener("loadedmetadata", async () => {
      const duration = isFinite(video.duration) ? video.duration : 10;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const frames = [];
      const count = Math.max(2, Math.min(16, targetCount));
      for (let i = 0; i < count; i++) {
        const t = (duration * (i + 0.5)) / count;
        await new Promise((res) => {
          const onSeeked = () => { video.removeEventListener("seeked", onSeeked); res(); };
          video.addEventListener("seeked", onSeeked);
          video.currentTime = t;
        });
        canvas.width = video.videoWidth || 720; canvas.height = video.videoHeight || 540;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.78);
        const m = dataUrl.match(/^data:(image\/[a-z+]+);base64,(.+)$/);
        if (m) frames.push({ mime: m[1], base64: m[2], dataUrl });
      }
      URL.revokeObjectURL(video.src);
      resolve(frames);
    });
    video.addEventListener("error", reject);
  });
}
