<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>Knox Forge — 3D modeling with AI</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg-2: #14141b;
    --card: #1a1a24;
    --card-2: #20202d;
    --border: #2a2a38;
    --border-soft: #20202b;
    --text: #f4f4f7;
    --muted: #8a8a98;
    --muted-2: #6b6b78;
    --primary: #7c5cff;
    --primary-2: #a78bff;
    --accent: #14b8a6;
    --red: #ff5c7a;
    --green: #5cff8a;
    --yellow: #ffd05c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(circle at 80% -10%, #1f1233 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'InterVariable', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    letter-spacing: -0.011em;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #app { min-height: 100vh; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

  /* ───── Brand mark ───── */
  .brand-mark {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: grid; place-items: center;
    position: relative;
  }
  .brand-mark svg { width: 18px; height: 18px; }

  /* ───── Auth / landing ───── */
  .auth-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }
  .auth-card { width: 100%; max-width: 420px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 32px; }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .logo-text { font-weight: 700; font-size: 17px; letter-spacing: -0.4px; line-height: 1.1; }
  .logo-text small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); letter-spacing: 0; margin-top: 3px; }
  .auth-title { font-size: 26px; font-weight: 700; letter-spacing: -0.6px; margin-bottom: 6px; }
  .auth-sub { color: var(--muted); font-size: 14px; line-height: 1.55; margin-bottom: 22px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 7px; }
  .field input { width: 100%; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--primary); }
  .btn { width: 100%; border: none; border-radius: 12px; padding: 13px; font-weight: 600; font-size: 14px; cursor: pointer; transition: transform 0.1s; font-family: inherit; }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: wait; }
  .btn-secondary { background: var(--bg-2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--primary); }
  .btn-row { display: flex; gap: 8px; }
  .auth-toggle { margin-top: 14px; text-align: center; font-size: 13px; color: var(--muted); }
  .auth-toggle a { color: var(--primary-2); text-decoration: none; font-weight: 600; cursor: pointer; }
  .auth-err { background: rgba(255,92,122,0.1); border: 1px solid rgba(255,92,122,0.4); color: var(--red); padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 12px; }

  /* ───── App shell ───── */
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 230px; background: rgba(10,10,15,0.6); border-right: 1px solid var(--border-soft); padding: 18px 12px; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh; }
  .sidebar-brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px 18px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 8px; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s; border: none; background: transparent; width: 100%; text-align: left; font-family: inherit; }
  .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .nav-item.active { background: rgba(124,92,255,0.12); color: var(--text); }
  .nav-item.active svg { color: var(--primary); }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--muted-2); }
  /* Constrain all icons inside buttons / labels acting as buttons */
  .btn svg, label.btn svg, .app-chip svg, .preset-chip svg { width: 16px; height: 16px; flex-shrink: 0; vertical-align: middle; }
  .page-title svg { width: 22px; height: 22px; vertical-align: middle; }
  .nav-divider { height: 1px; background: var(--border-soft); margin: 10px 4px; }
  .user-row { margin-top: auto; padding: 10px; border-top: 1px solid var(--border-soft); display: flex; align-items: center; gap: 10px; font-size: 12px; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: grid; place-items: center; font-weight: 700; font-size: 12px; color: var(--bg); flex-shrink: 0; }
  .user-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .user-row .ghost-btn { background: transparent; border: none; color: var(--muted-2); cursor: pointer; padding: 4px; }
  .user-row .ghost-btn:hover { color: var(--red); }

  .main { flex: 1; padding: 32px 32px 64px; max-width: 1100px; }
  .page-header { margin-bottom: 28px; }
  .page-title { font-size: 28px; font-weight: 700; letter-spacing: -0.7px; line-height: 1.15; }
  .page-sub { color: var(--muted); font-size: 14px; margin-top: 6px; line-height: 1.55; }

  /* ───── Forge (Generate) ───── */
  .prompt-shell { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 24px; }
  .prompt-shell textarea { width: 100%; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--text); font-family: inherit; font-size: 15px; line-height: 1.5; resize: vertical; min-height: 90px; outline: none; }
  .prompt-shell textarea:focus { border-color: var(--primary); }
  .prompt-shell .row { display: flex; gap: 10px; margin-top: 14px; align-items: center; }
  .prompt-shell .row .meta { flex: 1; font-size: 12px; color: var(--muted-2); }
  .preset-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
  .preset-chip { background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .preset-chip:hover { color: var(--text); border-color: var(--primary); }
  .preset-chip.active { background: rgba(124,92,255,0.15); color: var(--primary-2); border-color: var(--primary); }

  /* ───── Viewer ───── */
  .viewer-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; margin-bottom: 24px; }
  .viewer-head { padding: 14px 18px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .viewer-head h3 { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; }
  .viewer-head .pill { background: var(--bg-2); border: 1px solid var(--border); padding: 4px 10px; border-radius: 999px; font-size: 11px; color: var(--muted); }
  #viewer-canvas { width: 100%; height: 420px; background: radial-gradient(circle at 50% 40%, #1a1830 0%, #0a0a0f 70%); display: block; }
  .viewer-toolbar { padding: 12px 18px; border-top: 1px solid var(--border-soft); display: flex; gap: 8px; flex-wrap: wrap; }
  .viewer-toolbar .btn { width: auto; padding: 8px 14px; font-size: 13px; }
  .export-app-row { padding: 10px 18px 14px; border-top: 1px solid var(--border-soft); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .export-app-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
  .app-chip { background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 7px 13px; font-size: 12px; color: var(--text); cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .app-chip:hover { border-color: var(--primary); background: rgba(124,92,255,0.1); }
  .model-notes { padding: 10px 18px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border-soft); background: rgba(124,92,255,0.04); }
  .anim-caption { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); color: white; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.4); pointer-events: none; max-width: 80%; text-align: center; z-index: 5; }
  /* Scan page */
  .scan-wrap { max-width: 720px; margin: 24px auto; }
  .scan-viewfinder { background: var(--bg-2); border: 1px solid var(--border); border-radius: 18px; aspect-ratio: 4/3; display: grid; place-items: center; overflow: hidden; position: relative; }
  .scan-viewfinder video, .scan-viewfinder img { width: 100%; height: 100%; object-fit: cover; }
  .scan-empty { text-align: center; padding: 40px 20px; color: var(--muted); }
  .scan-empty .empty-icon { width: 56px; height: 56px; margin: 0 auto 14px; color: var(--muted); }
  .scan-empty .empty-icon svg { width: 100%; height: 100%; }
  .scan-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; padding: 18px 0; }
  .scan-controls .btn { width: auto; padding: 10px 18px; }
  .scan-tip { font-size: 12px; color: var(--muted); text-align: center; padding-bottom: 20px; }
  /* Scan modes + batch strip */
  .scan-mode-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; }
  .scan-mode-chip { background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 8px 16px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .scan-mode-chip:hover { color: var(--text); border-color: var(--primary); }
  .scan-mode-chip.active { background: rgba(124,92,255,0.18); color: var(--primary-2); border-color: var(--primary); font-weight: 600; }
  .scan-rec-indicator { position: absolute; top: 12px; left: 12px; background: rgba(220,38,38,0.95); color: white; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 999px; animation: scan-pulse 1.4s ease-in-out infinite; z-index: 3; }
  @keyframes scan-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
  .scan-batch-strip { display: flex; gap: 6px; overflow-x: auto; padding: 10px 4px; flex-wrap: nowrap; }
  .scan-thumb { width: 72px; height: 72px; min-width: 72px; border-radius: 10px; background-size: cover; background-position: center; position: relative; border: 1px solid var(--border); }
  .scan-thumb-remove { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.75); color: white; border: none; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; line-height: 1; cursor: pointer; padding: 0; }
  .scan-thumb-num { position: absolute; bottom: 2px; left: 4px; background: rgba(0,0,0,0.7); color: white; font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 600; }
  /* Doom Printing swipe deck */
  .doom-deck { max-width: 420px; margin: 24px auto; position: relative; }
  .doom-card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; overflow: hidden; box-shadow: 0 14px 40px rgba(0,0,0,0.5); }
  .doom-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--bg-2); display: block; }
  .doom-body { padding: 16px 18px; }
  .doom-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .doom-meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .doom-actions { display: flex; gap: 10px; padding: 0 18px 18px; }
  .doom-actions .btn { flex: 1; }
  .doom-skip { background: var(--bg-2); border: 1px solid var(--border); color: var(--muted); }
  .doom-save { background: linear-gradient(135deg, var(--primary), var(--primary-2)); color: white; border: none; }
  .doom-source-link { display: block; padding: 10px 18px 16px; text-align: center; font-size: 12px; color: var(--muted); }
  .doom-source-link a { color: var(--primary-2); text-decoration: none; }
  .doom-empty { text-align: center; padding: 50px 20px; color: var(--muted); }

  /* ───── Empty state ───── */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { width: 56px; height: 56px; margin: 0 auto 16px; background: var(--bg-2); border: 1px solid var(--border); border-radius: 14px; display: grid; place-items: center; color: var(--primary); }
  .empty h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; letter-spacing: -0.3px; }
  .empty p { font-size: 14px; line-height: 1.55; max-width: 380px; margin: 0 auto; }

  /* ───── Assistant chat ───── */
  .chat-window { background: var(--card); border: 1px solid var(--border); border-radius: 18px; display: flex; flex-direction: column; height: calc(100vh - 200px); min-height: 480px; }
  .chat-msgs { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 78%; padding: 12px 15px; border-radius: 16px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
  .msg.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.bot { background: var(--bg-2); color: var(--text); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.bot.thinking { color: var(--muted); font-style: italic; }
  .chat-input-row { padding: 14px; border-top: 1px solid var(--border-soft); display: flex; gap: 8px; }
  .chat-input-row textarea { flex: 1; background: var(--bg-2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; color: var(--text); font-family: inherit; font-size: 14px; resize: none; min-height: 44px; max-height: 200px; outline: none; }
  .chat-input-row textarea:focus { border-color: var(--primary); }
  .chat-send { background: var(--primary); color: white; border: none; border-radius: 12px; padding: 0 18px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .chat-send:disabled { opacity: 0.5; cursor: wait; }

  /* ───── Mobile ───── */
  @media (max-width: 800px) {
    .shell { flex-direction: column; }
    .sidebar { width: 100%; height: auto; padding: 12px; flex-direction: row; overflow-x: auto; position: sticky; top: 0; gap: 6px; z-index: 10; backdrop-filter: blur(12px); }
    .sidebar-brand, .user-row, .nav-divider { display: none; }
    .nav-item { white-space: nowrap; padding: 7px 12px; font-size: 12px; }
    .main { padding: 20px 16px 80px; }
    .page-title { font-size: 22px; }
  }

  /* ───── Spinner ───── */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div id="app"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
    "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';
import { OBJExporter } from 'three/addons/exporters/OBJExporter.js';
import { Brush, Evaluator, SUBTRACTION, ADDITION } from 'three-bvh-csg';

// ============================================================
// Config — shared with Nexus + Hub
// ============================================================
const NEXUS_API_BASE = "https://life-nexus-organizer.vercel.app";
const FORGE_SESSION_KEY = "knoxforge:session";
const FORGE_MODELS_KEY = "knoxforge:models";

// ============================================================
// Icons (SVG inline)
// ============================================================
const ICONS = {

  scan:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/></svg>`,

  models:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,

  sparkles: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg>`,
  signout:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
  download: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  save:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>`,
  image:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
  flame:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`,
};
const brandSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`;

// ============================================================
// Session / auth (shares Nexus user pool)
// ============================================================
function getSession() { try { return JSON.parse(localStorage.getItem(FORGE_SESSION_KEY) || "null"); } catch { return null; } }
function setSession(s) { localStorage.setItem(FORGE_SESSION_KEY, JSON.stringify(s)); }
function clearSession() { localStorage.removeItem(FORGE_SESSION_KEY); }
function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

async function hashPassword(password, saltHex) {
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const saltBytes = new Uint8Array(saltHex.match(/.{1,2}/g).map((b) => parseInt(b, 16)));
  const bits = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: saltBytes, iterations: 100000, hash: "SHA-256" }, key, 256);
  return Array.from(new Uint8Array(bits)).map((b) => b.toString(16).padStart(2, "0")).join("");
}
function randomHex(n) {
  const b = new Uint8Array(n);
  crypto.getRandomValues(b);
  return Array.from(b).map((x) => x.toString(16).padStart(2, "0")).join("");
}

async function login(identifier, password) {
  const looksLikePhone = /^[+\d\s\-().]+$/.test(identifier) && !identifier.includes("@");
  const r = await fetch(`${NEXUS_API_BASE}/api/auth/login`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(looksLikePhone ? { phone: identifier.trim(), password } : { email: identifier.trim(), password }),
  });
  const j = await r.json();
  if (!r.ok || !j.ok) throw new Error(j.error || `Sign-in failed (${r.status})`);
  return j.user;
}
async function createAccount(identifier, password) {
  const looksLikePhone = /^[+\d\s\-().]+$/.test(identifier) && !identifier.includes("@");
  const salt = randomHex(16);
  const passwordHash = await hashPassword(password, salt);
  const id = identifier.trim().toLowerCase();
  const profile = looksLikePhone
    ? { phone: id, name: id, passwordHash, passwordSalt: salt, createdAt: new Date().toISOString(), shareProfile: true }
    : { email: id, name: id.split("@")[0] || id, passwordHash, passwordSalt: salt, createdAt: new Date().toISOString(), shareProfile: true };
  const r = await fetch(`${NEXUS_API_BASE}/api/users`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({ id, profile }),
  });
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || `Couldn't create account (${r.status})`);
  return await login(identifier, password);
}

// ============================================================
async function generateModelFromPrompt(prompt, presets = [], image = null) {
  const payload = { input: prompt, presets };
  if (image && image.base64) {
    payload.imageBase64 = image.base64;
    payload.imageMimeType = image.mime || "image/png";
  }
  const r = await fetch(`${NEXUS_API_BASE}/api/ai/forge-model`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(payload),
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || `Generation failed (${r.status})`);
  if (j.ok === false) throw new Error(j.error || "AI didn't return a usable spec");
  if (!j.parts || !Array.isArray(j.parts) || j.parts.length === 0) {
    throw new Error("AI returned an empty model — try a more specific prompt");
  }
  return j;
}

// Geometry factory — converts one spec part into a THREE.BufferGeometry.
// Geometry is in LOCAL space (centered at origin). Caller applies the
// part's position/rotation onto a Brush wrapping the geometry.
function geomFromPart(p) {
  let geom;
  const kind = (p.kind || "box").toLowerCase();
  if (kind === "box" || kind === "cube") {
    const s = p.size || [10, 10, 10];
    geom = new THREE.BoxGeometry(s[0] || 10, s[1] || 10, s[2] || 10);
  } else if (kind === "sphere") {
    const r = p.radius || 10;
    geom = new THREE.SphereGeometry(r, 32, 24);
  } else if (kind === "cylinder") {
    const r = p.radius || 10;
    const h = (p.size && p.size[1]) || p.height || 10;
    geom = new THREE.CylinderGeometry(r, r, h, 32);
  } else if (kind === "cone") {
    const r = p.radius || 10;
    const h = (p.size && p.size[1]) || p.height || 10;
    geom = new THREE.ConeGeometry(r, h, 32);
  } else if (kind === "torus") {
    const r = p.radius || 10;
    const t = p.tube || 2;
    geom = new THREE.TorusGeometry(r, t, 16, 48);
  } else if (kind === "polyprism" || kind === "polygonprism" || kind === "polyprismatic") {
    const r = p.radius || 10;
    const h = (p.size && p.size[1]) || p.height || 10;
    const sides = Math.max(3, Math.min(32, p.sides || 6));
    geom = new THREE.CylinderGeometry(r, r, h, sides);
  } else if (kind === "extrude") {
    const outline = Array.isArray(p.outline) ? p.outline : [];
    const h = (p.size && p.size[1]) || p.height || 10;
    if (outline.length >= 3) {
      const shape = new THREE.Shape();
      shape.moveTo(outline[0][0], outline[0][1]);
      for (let i = 1; i < outline.length; i++) shape.lineTo(outline[i][0], outline[i][1]);
      shape.closePath();
      geom = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: false, curveSegments: 24 });
      geom.rotateX(-Math.PI / 2);
    } else {
      geom = new THREE.BoxGeometry(10, h, 10);
    }
  } else {
    const s = p.size || [10, 10, 10];
    geom = new THREE.BoxGeometry(s[0] || 10, s[1] || 10, s[2] || 10);
  }
  return geom;
}

// Real CSG: unions the "add" parts then subtracts the "subtract" parts.
// Returns a THREE.Group containing a single combined mesh. This makes
// hollows ACTUALLY hollow — both visually and in STL export.
function buildThreeGroupFromSpec(spec) {
  const group = new THREE.Group();
  const parts = spec.parts || [];
  if (parts.length === 0) return group;

  const evaluator = new Evaluator();
  evaluator.useGroups = false; // single material output
  evaluator.consolidateGroups = true;
  const baseColor = "#7c5cff";

  // Build Brush wrappers for every part
  const brushes = parts.map(p => {
    const geom = geomFromPart(p);
    const brush = new Brush(geom);
    const pos = p.position || [0, 0, 0];
    brush.position.set(pos[0] || 0, pos[1] || 0, pos[2] || 0);
    if (p.rotation) {
      const r = p.rotation;
      brush.rotation.set(
        THREE.MathUtils.degToRad(r[0] || 0),
        THREE.MathUtils.degToRad(r[1] || 0),
        THREE.MathUtils.degToRad(r[2] || 0)
      );
    }
    brush.updateMatrixWorld(true);
    brush.op = (p.op || "add").toLowerCase();
    brush.partColor = p.color || baseColor;
    return brush;
  });

  // Split into additive and subtractive
  const adds = brushes.filter(b => b.op !== "subtract" && b.op !== "sub");
  const subs = brushes.filter(b => b.op === "subtract" || b.op === "sub");

  // If we have at least one additive part, do real CSG. Else just render
  // everything as separate solids (fallback for malformed specs).
  if (adds.length > 0) {
    try {
      let result = adds[0];
      for (let i = 1; i < adds.length; i++) {
        result = evaluator.evaluate(result, adds[i], ADDITION);
      }
      for (const sub of subs) {
        result = evaluator.evaluate(result, sub, SUBTRACTION);
      }
      const mat = new THREE.MeshStandardMaterial({ color: adds[0].partColor || baseColor, roughness: 0.55, metalness: 0.05 });
      const finalMesh = new THREE.Mesh(result.geometry, mat);
      finalMesh.castShadow = true;
      finalMesh.receiveShadow = true;
      group.add(finalMesh);
      return group;
    } catch (err) {
      console.warn("CSG failed, falling back to non-boolean render:", err);
      // Fall through to simple render
    }
  }

  // Fallback: render each part as a separate mesh (no boolean ops)
  for (const b of brushes) {
    const mat = new THREE.MeshStandardMaterial({
      color: b.partColor || baseColor,
      roughness: 0.55,
      metalness: 0.05,
      // Subtract parts get rendered as semi-transparent ghosts to signal intent
      transparent: b.op === "subtract" || b.op === "sub",
      opacity: (b.op === "subtract" || b.op === "sub") ? 0.35 : 1,
    });
    const mesh = new THREE.Mesh(b.geometry, mat);
    mesh.position.copy(b.position);
    mesh.rotation.copy(b.rotation);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  }
  return group;
}

function downloadBlob(filename, content, mime = "application/octet-stream") {
  const blob = content instanceof Blob ? content : new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// 3D viewer
// ============================================================
let viewerScene, viewerCamera, viewerRenderer, viewerControls, viewerGroup, viewerAnimId;
function initViewer(canvas) {
  if (viewerRenderer) viewerRenderer.dispose();
  if (viewerAnimId) cancelAnimationFrame(viewerAnimId);
  viewerScene = new THREE.Scene();
  viewerScene.background = null;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  viewerCamera = new THREE.PerspectiveCamera(45, w / h, 0.1, 5000);
  viewerCamera.position.set(70, 50, 70);
  viewerRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  viewerRenderer.setPixelRatio(window.devicePixelRatio || 1);
  viewerRenderer.setSize(w, h, false);
  viewerRenderer.shadowMap.enabled = true;

  // Lights
  const hemi = new THREE.HemisphereLight(0xb4baff, 0x202030, 0.6);
  viewerScene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(50, 80, 30);
  dir.castShadow = true;
  viewerScene.add(dir);
  const fill = new THREE.DirectionalLight(0x7c5cff, 0.3);
  fill.position.set(-40, 20, -30);
  viewerScene.add(fill);

  // Floor
  const floor = new THREE.Mesh(
    new THREE.CircleGeometry(80, 64),
    new THREE.MeshStandardMaterial({ color: 0x14141b, roughness: 0.9 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.01;
  floor.receiveShadow = true;
  viewerScene.add(floor);

  // Grid
  const grid = new THREE.GridHelper(160, 32, 0x2a2a38, 0x20202b);
  grid.position.y = 0;
  viewerScene.add(grid);

  viewerControls = new OrbitControls(viewerCamera, canvas);
  viewerControls.enableDamping = true;
  viewerControls.dampingFactor = 0.08;
  viewerControls.target.set(0, 10, 0);

  function tick() {
    viewerAnimId = requestAnimationFrame(tick);
    viewerControls.update();
    viewerRenderer.render(viewerScene, viewerCamera);
  }
  tick();

  // Handle resize
  const ro = new ResizeObserver(() => {
    if (!viewerRenderer || !viewerCamera) return;
    const cw = canvas.clientWidth, ch = canvas.clientHeight;
    viewerCamera.aspect = cw / ch;
    viewerCamera.updateProjectionMatrix();
    viewerRenderer.setSize(cw, ch, false);
  });
  ro.observe(canvas);
}

function setViewerModel(spec) {
  if (!viewerScene) return;
  if (viewerGroup) viewerScene.remove(viewerGroup);
  viewerGroup = buildThreeGroupFromSpec(spec);

  // Auto-frame: compute bounding box and recenter camera
  const box = new THREE.Box3().setFromObject(viewerGroup);
  const size = box.getSize(new THREE.Vector3()).length();
  const center = box.getCenter(new THREE.Vector3());
  viewerControls.target.copy(center);
  const dist = Math.max(40, size * 1.8);
  viewerCamera.position.set(center.x + dist * 0.7, center.y + dist * 0.5, center.z + dist * 0.7);
  viewerCamera.near = size / 100; viewerCamera.far = size * 10; viewerCamera.updateProjectionMatrix();
  viewerScene.add(viewerGroup);
}

function modelFilename(ext) {
  const base = (lastSpec?.name || "knox-forge").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "knox-forge";
  return `${base}-${Date.now()}.${ext}`;
}
function exportSTL() {
  if (!viewerGroup) return alert("Generate something first");
  const exp = new STLExporter();
  const stl = exp.parse(viewerGroup, { binary: false });
  downloadBlob(modelFilename("stl"), stl, "model/stl");
}
function exportOBJ() {
  if (!viewerGroup) return alert("Generate something first");
  const exp = new OBJExporter();
  const obj = exp.parse(viewerGroup);
  downloadBlob(modelFilename("obj"), obj, "text/plain");
}
// 3MF — Bambu Studio's preferred format. We emit a minimal valid 3MF zip
// containing the model as STL-equivalent triangles. Bambu Studio accepts STL
// inside a 3MF wrapper, and most slicers handle this fine.
function export3MF() {
  if (!viewerGroup) return alert("Generate something first");
  // Minimal valid approach: ship as STL with .3mf extension — slicers usually
  // detect by content. For true 3MF we'd need a zip with model XML. Honest
  // fallback: most users want STL anyway, so this saves them a click.
  const exp = new STLExporter();
  const stl = exp.parse(viewerGroup, { binary: false });
  downloadBlob(modelFilename("stl"), stl, "model/stl");
  showToast("Saved as STL (compatible with Bambu Studio, OrcaSlicer, Cura — true 3MF coming soon)");
}

// ============================================================
// Send to specific apps — Path A: Web Share API (Windows 11+/macOS 13+)
// opens the OS native share sheet which lists installed apps that can
// handle .stl files (Bambu Studio, OrcaSlicer, Cura, etc.). Pick once,
// the OS remembers. True one-click open after first setup.
// Fallback: download with clear drag-drop instructions.
// ============================================================
async function sendToApp(app) {
  if (!viewerGroup) return alert("Generate something first");
  // 1) If the Knox Forge Desktop Helper is installed, use it — true 1-click open.
  //    The helper handles knox-forge://send?app=<app>&stl=<base64> protocol URLs.
  //    Detection trick: try to navigate to a knox-forge:// URL and listen for blur.
  //    If the helper is installed, the OS opens it and our tab loses focus briefly.
  if (await tryDesktopHelper(app)) return;

  // 2) Fall back to Web Share API + downloaded file (the original Path A)
  const apps = {
    bambu: {
      name: "Bambu Studio",
      web: "https://bambulab.com/en/download/studio",
      hint: "Tip: in the share sheet, pick Bambu Studio. Windows/macOS will remember it next time.",
      fallback: "STL saved to your Downloads folder. Open Bambu Studio and drag the file onto the build plate (or File → Import → STL).",
    },
    orca: {
      name: "OrcaSlicer",
      web: "https://github.com/SoftFever/OrcaSlicer/releases",
      hint: "Tip: in the share sheet, pick OrcaSlicer.",
      fallback: "STL saved to your Downloads folder. Open OrcaSlicer and drag the file onto the build plate.",
    },
    cura: {
      name: "Cura",
      web: "https://ultimaker.com/software/ultimaker-cura/",
      hint: "Tip: in the share sheet, pick Cura.",
      fallback: "STL saved to your Downloads folder. Open Cura and drag the file onto the build plate.",
    },
    blender: {
      name: "Blender",
      web: "https://www.blender.org/download/",
      hint: "Tip: in the share sheet, pick Blender.",
      fallback: "STL saved to your Downloads folder. In Blender: File → Import → STL.",
    },
    fusion: {
      name: "Fusion 360",
      web: "https://www.autodesk.com/products/fusion-360/",
      hint: "Tip: in the share sheet, pick Fusion 360.",
      fallback: "STL saved to your Downloads folder. In Fusion 360: Insert → Insert Mesh.",
    },
  };
  const cfg = apps[app];
  if (!cfg) return;

  // Build STL blob in-memory
  const exp = new STLExporter();
  const stlText = exp.parse(viewerGroup, { binary: false });
  const filename = modelFilename("stl");
  const file = new File([stlText], filename, { type: "model/stl" });

  // Try Web Share API Level 2 (with files). Only works on https + supports + user gesture.
  const canShareFile = typeof navigator !== "undefined"
    && typeof navigator.canShare === "function"
    && typeof navigator.share === "function"
    && navigator.canShare({ files: [file] });

  if (canShareFile) {
    try {
      await navigator.share({
        files: [file],
        title: lastSpec?.name || "Knox Forge model",
        text: `Open this 3D model in ${cfg.name}`,
      });
      // Share sheet opened. Some OSes still also save a copy; show the hint.
      showToast(cfg.hint, 5000);
      return;
    } catch (err) {
      // User canceled the share sheet (AbortError) — silent. Other errors fall through.
      if (err && err.name === "AbortError") return;
      // Otherwise fall through to download fallback
    }
  }

  // Fallback: download + clear instructions
  downloadBlob(filename, stlText, "model/stl");
  showToast(cfg.fallback, 9000, cfg.web);
}

// Try to launch Knox Forge Desktop Helper via knox-forge:// protocol.
// Returns true if the helper was likely invoked (browser lost focus).
// If the helper isn't installed, the browser does nothing and we fall through.
async function tryDesktopHelper(app) {
  if (!viewerGroup) return false;
  // Build the STL as base64 — URI-safe via Uint8Array → btoa
  const exp = new STLExporter();
  const stlText = exp.parse(viewerGroup, { binary: false });
  // base64-encode the STL text safely
  let stlB64;
  try {
    stlB64 = btoa(unescape(encodeURIComponent(stlText)));
  } catch (e) {
    return false;
  }
  // Hard cap: protocol URLs have a length limit (~2KB on Windows). Big models
  // would exceed it. Above 1.5MB of base64 we skip helper and fall to download.
  if (stlB64.length > 1_500_000) return false;

  const safeName = (lastSpec?.name || "knox-forge").toLowerCase().replace(/[^a-z0-9]+/g, "-").slice(0, 40);
  const protoUrl = `knox-forge://send?app=${encodeURIComponent(app)}&name=${encodeURIComponent(safeName)}&stl=${encodeURIComponent(stlB64)}`;

  // Detect helper presence via blur event after firing the URL.
  // If the helper exists, the OS launches it and our window briefly loses focus.
  return new Promise((resolve) => {
    let blurred = false;
    const onBlur = () => { blurred = true; };
    window.addEventListener("blur", onBlur, { once: true });

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = protoUrl;
    document.body.appendChild(iframe);

    setTimeout(() => {
      window.removeEventListener("blur", onBlur);
      try { iframe.remove(); } catch {}
      if (blurred) {
        showToast(`Sent to ${app}. The app should open with your model loaded.`, 5000);
        resolve(true);
      } else {
        // Helper not installed — caller will fall back to Web Share / download
        resolve(false);
      }
    }, 800);
  });
}

// Tiny toast — used for "saved", export hints, etc.
function showToast(msg, ms = 3000, helpUrl = null) {
  let host = document.getElementById("forge-toast");
  if (!host) {
    host = document.createElement("div");
    host.id = "forge-toast";
    host.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:12px;font-size:13px;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,0.4);max-width:520px;text-align:center;line-height:1.4;display:none";
    document.body.appendChild(host);
  }
  host.innerHTML = helpUrl
    ? `${escapeHtml(msg)}<br><a href="${helpUrl}" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:underline;font-size:12px">Don't have it? Get it here ↗</a>`
    : escapeHtml(msg);
  host.style.display = "block";
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { host.style.display = "none"; }, ms);
}

// "See it in action" — AI-generated 3D animation showing real-world use
// ============================================================
let animationHelpers = [];      // current helper meshes in the scene
let animationRAF = null;        // current requestAnimationFrame id

async function playSeeInAction() {
  if (!lastSpec) return alert("Generate something first");

    });

    await runAnimation(j);
  } catch (e) {
    showToast("Animation failed: " + (e.message || "unknown error"));
  } finally {
    btn.disabled = false;
    btn.innerHTML = `↻ <span style="margin-left:6px">Replay</span>`;
  }
}

function clearAnimation() {
  if (animationRAF) cancelAnimationFrame(animationRAF);
  animationRAF = null;
  for (const m of animationHelpers) viewerScene?.remove(m);
  animationHelpers = [];
  const cap = document.getElementById("anim-caption");
  if (cap) { cap.style.display = "none"; cap.innerText = ""; }
}

function buildHelperMesh(h) {
  let geom;
  const kind = (h.kind || "box").toLowerCase();
  if (kind === "box") {
    const s = h.size || [10, 10, 10];
    geom = new THREE.BoxGeometry(s[0] || 10, s[1] || 10, s[2] || 10);
  } else if (kind === "sphere") {
    geom = new THREE.SphereGeometry(h.radius || 10, 24, 16);
  } else if (kind === "cylinder") {
    geom = new THREE.CylinderGeometry(h.radius || 10, h.radius || 10, h.height || 30, 24);
  } else if (kind === "polyprism") {
    geom = new THREE.CylinderGeometry(h.radius || 10, h.radius || 10, h.height || 30, Math.max(3, Math.min(32, h.sides || 6)));
  } else {
    const s = h.size || [10, 10, 10];
    geom = new THREE.BoxGeometry(s[0] || 10, s[1] || 10, s[2] || 10);
  }
  const mat = new THREE.MeshStandardMaterial({ color: h.color || "#888888", roughness: 0.6, metalness: 0.1, transparent: true, opacity: 0.92 });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.userData.label = h.label || "";
  return mesh;
}

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

async function runAnimation(script) {
  clearAnimation();
  if (!viewerScene) return;
  // Build helper meshes (start hidden)
  const helperById = {};
  for (const h of (script.helpers || [])) {
    const mesh = buildHelperMesh(h);
    mesh.visible = false;
    viewerScene.add(mesh);
    animationHelpers.push(mesh);
    helperById[h.id] = mesh;
  }
  const caption = document.getElementById("anim-caption");
  const startedAt = performance.now();
  const totalDuration = script.duration || 6000;

  return new Promise((resolve) => {
    function tick() {
      const now = performance.now();
      const elapsed = now - startedAt;
      let anyActive = false;
      let currentCaption = "";

      for (const step of (script.steps || [])) {
        const m = helperById[step.helperId];
        if (!m) continue;
        const stepStart = step.startAt || 0;
        const stepDur = step.duration || 1500;
        if (elapsed < stepStart) continue;
        if (elapsed > stepStart + stepDur) {
          // Lock to final position
          if (step.toPosition) m.position.set(step.toPosition[0] || 0, step.toPosition[1] || 0, step.toPosition[2] || 0);
          if (step.toRotation) m.rotation.set(THREE.MathUtils.degToRad(step.toRotation[0] || 0), THREE.MathUtils.degToRad(step.toRotation[1] || 0), THREE.MathUtils.degToRad(step.toRotation[2] || 0));
          m.visible = true;
          continue;
        }
        // Currently active step
        m.visible = true;
        anyActive = true;
        currentCaption = step.caption || currentCaption;
        const t = easeInOut(Math.min(1, Math.max(0, (elapsed - stepStart) / stepDur)));
        const from = step.fromPosition || [0, 0, 0];
        const to = step.toPosition || from;
        m.position.set(from[0] + (to[0] - from[0]) * t, from[1] + (to[1] - from[1]) * t, from[2] + (to[2] - from[2]) * t);
        if (step.fromRotation && step.toRotation) {
          const fr = step.fromRotation, tr = step.toRotation;
          m.rotation.set(
            THREE.MathUtils.degToRad(fr[0] + (tr[0] - fr[0]) * t),
            THREE.MathUtils.degToRad(fr[1] + (tr[1] - fr[1]) * t),
            THREE.MathUtils.degToRad(fr[2] + (tr[2] - fr[2]) * t)
          );
        }
      }

      if (caption) {
        if (currentCaption) {
          caption.innerText = currentCaption;
          caption.style.display = "block";
        }
      }

      if (elapsed < totalDuration) {
        animationRAF = requestAnimationFrame(tick);
      } else {
        animationRAF = null;
        if (caption) caption.innerText = `${script.title || "Demo complete"} — click Replay to watch again`;
        resolve();
      }
    }
    animationRAF = requestAnimationFrame(tick);
  });
}

// ───── Scan — three modes: single photo / multi-angle batch / video ─────
let scanStream = null;
let scanLastPhoto = null;            // single mode
let scanBatchPhotos = [];            // multi-angle mode: [{mime, base64, dataUrl}, ...]
let scanRecorder = null;             // video mode MediaRecorder
let scanRecordChunks = [];           // video mode recorded blob chunks
let scanMode = "single";             // "single" | "batch" | "video"

async function startScanCamera(videoEl) {
  if (scanStream) {
    for (const t of scanStream.getTracks()) t.stop();
    scanStream = null;
  }
  try {
    scanStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
    videoEl.srcObject = scanStream;
    await videoEl.play().catch(() => {});
  } catch (err) {
    throw err;
  }
}

function stopScanCamera() {
  if (scanStream) {
    for (const t of scanStream.getTracks()) t.stop();
    scanStream = null;
  }
}

function captureScanPhoto(videoEl) {
  const canvas = document.createElement("canvas");
  const vw = videoEl.videoWidth || 1280;
  const vh = videoEl.videoHeight || 720;
  canvas.width = vw;
  canvas.height = vh;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(videoEl, 0, 0, vw, vh);
  const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
  const m = dataUrl.match(/^data:(image\/[a-z+]+);base64,(.+)$/);
  if (!m) return null;
  return { mime: m[1], base64: m[2], dataUrl };
}

async function scanGenerateFromImages(images, hint) {
  // images: [{mime, base64}, ...]  hint: optional text override
  if (!images || images.length === 0) throw new Error("No images to send");
  const endpoint = images.length === 1 ? "/api/ai/forge-model" : "/api/ai/forge-scan";
  const body = images.length === 1
    ? { input: hint || "Identify the object in this photo and generate a 3D-printable model that matches its shape and real-world dimensions.", presets: ["model"], imageBase64: images[0].base64, imageMimeType: images[0].mime || "image/jpeg" }
    : { imagesBase64: images.map(i => i.base64), hint: hint || "" };
  const r = await fetch(`${NEXUS_API_BASE}${endpoint}`, {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify(body),
  });
  const j = await r.json();
  if (!r.ok || j.ok === false) throw new Error(j.error || `Scan failed (${r.status})`);
  if (!j.parts || !Array.isArray(j.parts) || j.parts.length === 0) throw new Error("AI returned an empty model — try better/more angles");
  return j;
}

// Extract evenly-spaced keyframes from a recorded video blob
async function extractVideoFrames(blob, targetCount = 12) {
  return new Promise((resolve, reject) => {
    const video = document.createElement("video");
    video.muted = true; video.playsInline = true;
    video.src = URL.createObjectURL(blob);
    video.addEventListener("loadedmetadata", async () => {
      const duration = isFinite(video.duration) ? video.duration : 10;
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const frames = [];
      const count = Math.max(2, Math.min(16, targetCount));
      for (let i = 0; i < count; i++) {
        const t = (duration * (i + 0.5)) / count;
        await new Promise((res) => {
          const onSeeked = () => { video.removeEventListener("seeked", onSeeked); res(); };
          video.addEventListener("seeked", onSeeked);
          video.currentTime = t;
        });
        canvas.width = video.videoWidth || 720;
        canvas.height = video.videoHeight || 540;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.78);
        const m = dataUrl.match(/^data:(image\/[a-z+]+);base64,(.+)$/);
        if (m) frames.push({ mime: m[1], base64: m[2], dataUrl });
      }
      URL.revokeObjectURL(video.src);
      resolve(frames);
    });
    video.addEventListener("error", reject);
  });
}

      }
    });
  }

  // --- Single mode ---
  function wireSingleMode() {
    bindStartCamera();
    document.getElementById("scan-capture")?.addEventListener("click", () => {
      const photo = captureScanPhoto(video);
      if (!photo) return showToast("Couldn't capture");
      scanLastPhoto = { mime: photo.mime, base64: photo.base64 };
      preview.src = photo.dataUrl;
      video.style.display = "none";
      preview.style.display = "block";
      document.getElementById("scan-capture").style.display = "none";
      document.getElementById("scan-retake").style.display = "inline-flex";
      document.getElementById("scan-generate").style.display = "inline-flex";
      stopScanCamera();
    });
    document.getElementById("scan-retake")?.addEventListener("click", async () => {
      scanLastPhoto = null;
      preview.style.display = "none";
      video.style.display = "block";
      document.getElementById("scan-capture").style.display = "inline-flex";
      document.getElementById("scan-capture").disabled = false;
      document.getElementById("scan-retake").style.display = "none";
      document.getElementById("scan-generate").style.display = "none";
      try { await startScanCamera(video); } catch {}
    });
    document.getElementById("scan-generate")?.addEventListener("click", () => runScanGenerate([scanLastPhoto], "single-photo"));
  }

  // --- Batch mode (multi-angle) ---
  function refreshBatchStrip() {
    if (scanBatchPhotos.length === 0) { batchStrip.style.display = "none"; return; }
    batchStrip.style.display = "flex";
    batchStrip.innerHTML = scanBatchPhotos.map((p, i) => `
      <div class="scan-thumb" style="background-image:url('${p.dataUrl}')">
        <button class="scan-thumb-remove" data-i="${i}" title="Remove">✕</button>
        <span class="scan-thumb-num">${i + 1}</span>
      </div>
    `).join("");
    batchStrip.querySelectorAll(".scan-thumb-remove").forEach(b => b.addEventListener("click", (e) => {
      const idx = Number(b.dataset.i);
      scanBatchPhotos.splice(idx, 1);
      refreshBatchStrip();
      refreshControls();
    }));
  }
  function wireBatchMode() {
    bindStartCamera();
    refreshBatchStrip();
    document.getElementById("scan-capture")?.addEventListener("click", () => {
      if (scanBatchPhotos.length >= 16) return showToast("16-view max. Remove some to add more.", 4000);
      const photo = captureScanPhoto(video);
      if (!photo) return showToast("Couldn't capture");
      scanBatchPhotos.push(photo);
      refreshBatchStrip();
      refreshControls();
    });
    document.getElementById("scan-clear-batch")?.addEventListener("click", () => {
      if (scanBatchPhotos.length === 0) return;
      if (!confirm(`Clear all ${scanBatchPhotos.length} photos?`)) return;
      scanBatchPhotos = [];
      refreshBatchStrip();
      refreshControls();
    });
    document.getElementById("scan-generate")?.addEventListener("click", () => runScanGenerate(scanBatchPhotos, "multi-angle"));
  }

  // --- Video mode ---
  function wireVideoMode() {
    bindStartCamera();
    document.getElementById("scan-record-start")?.addEventListener("click", () => {
      if (!scanStream) return showToast("Start the camera first");
      scanRecordChunks = [];
      // Pick the best codec the browser supports
      const mime = MediaRecorder.isTypeSupported("video/webm;codecs=vp9") ? "video/webm;codecs=vp9"
                 : MediaRecorder.isTypeSupported("video/webm;codecs=vp8") ? "video/webm;codecs=vp8"
                 : MediaRecorder.isTypeSupported("video/webm") ? "video/webm"
                 : MediaRecorder.isTypeSupported("video/mp4") ? "video/mp4"
                 : "";
      if (!mime) return showToast("Your browser can't record video. Use multi-angle photo mode instead.");
      try {
        scanRecorder = new MediaRecorder(scanStream, { mimeType: mime });
        scanRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) scanRecordChunks.push(e.data); };
        scanRecorder.onstop = async () => {
          recIndicator.style.display = "none";
          const blob = new Blob(scanRecordChunks, { type: mime });
          showToast("Extracting frames…", 3000);
          try {
            const frames = await extractVideoFrames(blob, 12);
            if (frames.length === 0) throw new Error("Couldn't extract frames");
            // Show first frame as preview
            video.style.display = "none";
            preview.src = frames[0].dataUrl;
            preview.style.display = "block";
            stopScanCamera();
            runScanGenerate(frames, "video-pan");
          } catch (e) {
            showToast("Frame extraction failed: " + e.message, 5000);
            document.getElementById("scan-record-stop").style.display = "none";
            document.getElementById("scan-record-start").style.display = "inline-flex";
          }
        };
        scanRecorder.start();
        recIndicator.style.display = "block";
        document.getElementById("scan-record-start").style.display = "none";
        document.getElementById("scan-record-stop").style.display = "inline-flex";
        // Auto-stop after 15 seconds
        setTimeout(() => { if (scanRecorder && scanRecorder.state === "recording") scanRecorder.stop(); }, 15000);
      } catch (e) {
        showToast("Couldn't start recording: " + e.message, 5000);
      }
    });
    document.getElementById("scan-record-stop")?.addEventListener("click", () => {
      if (scanRecorder && scanRecorder.state === "recording") scanRecorder.stop();
    });
  }

  // --- shared: run scan AI + route to Forge ---
  async function runScanGenerate(images, modeLabel) {
    const genBtn = document.getElementById("scan-generate") || document.getElementById("scan-record-stop");
    if (genBtn) { genBtn.disabled = true; genBtn.innerHTML = `<span class="spinner"></span> Analyzing ${images.length} view${images.length === 1 ? "" : "s"}…`; }
    try {
      const spec = await scanGenerateFromImages(images, "");
      lastSpec = spec;
      lastPrompt = `(scanned via ${modeLabel}, ${images.length} view${images.length === 1 ? "" : "s"})`;
      currentRoute = "forge";
      const mainEl = document.querySelector(".main");
      renderForge(mainEl);
      const confLabel = spec.confidence ? ` (confidence: ${spec.confidence})` : "";
      const idLabel = spec.identifiedObject ? `Identified: ${spec.identifiedObject}${confLabel}.` : "Model generated.";
      showToast(`${idLabel} View + export in Forge.`, 8000);
    } catch (e) {
      showToast("Scan failed: " + (e.message || "unknown"), 8000);
      if (genBtn) { genBtn.disabled = false; refreshControls(); }
    }
  }
}

// ───── Doom Printing (the Tinder-swipe feed for 3D models) ─────
let doomFeed = [];
let doomIndex = 0;
const DOOM_SAVED_KEY = "forge:doom-saved";

function getDoomSaved() { try { return JSON.parse(localStorage.getItem(DOOM_SAVED_KEY) || "[]"); } catch { return []; } }
function saveDoomItem(item) {
  const all = getDoomSaved();
  if (!all.find(m => m.url === item.url)) {
    all.unshift({ ...item, savedAt: new Date().toISOString() });
    localStorage.setItem(DOOM_SAVED_KEY, JSON.stringify(all.slice(0, 200)));
  }
}

async function fetchDoomFeed() {
  const r = await fetch(`${NEXUS_API_BASE}/api/ai/doom-feed?source=both`, { method: "GET" });
  const j = await r.json().catch(() => ({}));
  if (!r.ok || j.ok === false) throw new Error(j.error || "Couldn't load the feed");
  return Array.isArray(j.items) ? j.items : [];
}

function renderDoomPrinting(el) {
  el.innerHTML = `
    <header class="page-header">
      <div class="page-title">${ICONS.flame}<span style="margin-left:8px;vertical-align:middle">Doom Printing</span></div>
      <div class="page-sub">Tinder for 3D prints. Swipe through models from MakerWorld + Printables. Save the ones you'd actually print.</div>
    </header>
    <div id="doom-host"></div>
  `;
  const host = document.getElementById("doom-host");
  host.innerHTML = `<div class="doom-empty"><span class="spinner"></span> Loading the feed…</div>`;
  fetchDoomFeed()
    .then(items => {
      doomFeed = items;
      doomIndex = 0;
      renderDoomCard(host);
    })
    .catch(err => {
      host.innerHTML = `<div class="doom-empty">Couldn't load the feed: ${escapeHtml(err.message)}<br><br>The Printables + MakerWorld endpoints can be flaky. Pull to refresh.</div>`;
    });
}

function renderDoomCard(host) {
  if (doomIndex >= doomFeed.length) {
    host.innerHTML = `
      <div class="doom-empty">
        <h2 style="color:var(--text);margin-bottom:8px">That's the whole feed.</h2>
        <p>You burned through ${doomFeed.length} models. Check My Models for the ones you saved, or come back later for fresh prints.</p>
        <button class="btn btn-primary" id="doom-refresh" style="width:auto;padding:10px 20px;margin-top:16px">${ICONS.flame}<span style="margin-left:6px">Get more</span></button>
      </div>
    `;
    document.getElementById("doom-refresh")?.addEventListener("click", () => renderDoomPrinting(document.getElementById("app").querySelector(".main")));
    return;
  }
  const item = doomFeed[doomIndex];
  host.innerHTML = `
    <div class="doom-deck">
      <div class="doom-card">
        <img class="doom-img" src="${escapeHtml(item.image || "")}" alt="" onerror="this.style.background='var(--bg-2)';this.removeAttribute('src')" />
        <div class="doom-body">
          <div class="doom-title">${escapeHtml(item.title || "Untitled model")}</div>
          <div class="doom-meta">by ${escapeHtml(item.author || "unknown")} · ${escapeHtml(item.source || "")}${item.downloads ? ` · ${item.downloads.toLocaleString()} downloads` : ""}</div>
        </div>
        <div class="doom-actions">
          <button class="btn doom-skip" id="doom-skip">Skip →</button>
          <button class="btn doom-save" id="doom-save">${ICONS.flame}<span style="margin-left:6px">Save</span></button>
        </div>
        <div class="doom-source-link"><a href="${escapeHtml(item.url || "#")}" target="_blank" rel="noopener">View on ${escapeHtml(item.source || "source site")} ↗</a></div>
      </div>
    </div>
  `;
  document.getElementById("doom-skip").addEventListener("click", () => { doomIndex++; renderDoomCard(host); });
  document.getElementById("doom-save").addEventListener("click", () => {
    saveDoomItem(item);
    showToast("Saved to My Models");
    doomIndex++;
    renderDoomCard(host);
  });
}

// Old name kept as an alias so existing routes still work during the rename
function renderDiscover(el) { return renderDoomPrinting(el); }

// ───── My Models ─────
function renderModels(el) {
  const models = getSavedModels();
  el.innerHTML = `
    <header class="page-header">
      <div class="page-title">My Models</div>
      <div class="page-sub">Everything you've generated and saved.</div>
    </header>
    ${models.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">${ICONS.models}</div>
        <h2>Nothing saved yet</h2>
        <p>Generate a model in Forge and tap "Save to My Models" — they'll show up here.</p>
      </div>
    ` : `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">
        ${models.map(m => `
          <div class="prompt-shell" style="margin:0;padding:16px">
            <div style="font-weight:600;font-size:15px;margin-bottom:4px">${escapeHtml(m.name)}</div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5;max-height:60px;overflow:hidden">${escapeHtml(m.prompt || "")}</div>
            <div style="font-size:11px;color:var(--muted-2);margin-bottom:10px">${m.spec?.parts?.length || 0} parts · saved ${new Date(m.savedAt).toLocaleDateString()}</div>
            <div style="display:flex;gap:6px">
              <button class="btn btn-secondary" data-load="${m.id}" style="flex:1;padding:8px;font-size:12px">Open in Forge</button>
              <button class="btn btn-secondary" data-del="${m.id}" style="width:auto;padding:8px 10px;font-size:12px;color:var(--red);border-color:rgba(255,92,122,0.3)">Delete</button>
            </div>
          </div>
        `).join("")}
      </div>
    `}
  `;
  document.querySelectorAll("[data-load]").forEach(b => b.addEventListener("click", () => {
    const m = models.find(x => x.id === Number(b.dataset.load));
    if (!m) return;
    lastSpec = m.spec; lastPrompt = m.prompt || "";
    currentRoute = "forge"; renderShell();
  }));
  document.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", () => {
    if (!confirm("Delete this model?")) return;
    deleteSavedModel(Number(b.dataset.del));
    renderPage();
  }));
}

// ───── Assistant ─────
function renderAssistant(el) {
  el.innerHTML = `
    <header class="page-header">
      <div class="page-title">Assistant</div>
      <div class="page-sub">Ask anything about 3D printing, Bambu printers, slicer settings, materials, or this app.</div>
    </header>
    <div class="chat-window">
      <div class="chat-msgs" id="msgs">
        ${chatHistory.length === 0 ? `
          <div class="msg bot">Hi — I'm Forge's AI assistant. Ask me about 3D printing, your Bambu printer (X1C, P1S, A1, etc.), slicer settings, filament problems, or how this app works.</div>
        ` : chatHistory.map(m => `<div class="msg ${m.role === "user" ? "user" : "bot"}${m.thinking ? " thinking" : ""}">${escapeHtml(m.content)}</div>`).join("")}
      </div>
      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="e.g. My PLA print is curling on the corners — what's wrong?" rows="1"></textarea>
        <button class="chat-send" id="chat-send">Send</button>
      </div>
    </div>
  `;
  const msgs = document.getElementById("msgs");
  msgs.scrollTop = msgs.scrollHeight;
  const send = async () => {
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text) return;
    chatHistory.push({ role: "user", content: text });
    chatHistory.push({ role: "assistant", content: "Thinking…", thinking: true });
    input.value = "";
    renderAssistant(el);
    try {
      const reply = await chatAssistant(chatHistory.filter(m => !m.thinking));
      chatHistory = chatHistory.filter(m => !m.thinking);
      chatHistory.push({ role: "assistant", content: reply });
    } catch (ex) {
      chatHistory = chatHistory.filter(m => !m.thinking);
      chatHistory.push({ role: "assistant", content: "Sorry — couldn't reach the AI. Try again in a moment." });
    }
    renderAssistant(el);
  };
  document.getElementById("chat-send").addEventListener("click", send);
  document.getElementById("chat-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
}

// ============================================================
// Boot
// ============================================================
render();

// PWA: register service worker so Chrome offers "Install Knox Forge"
// in the address bar omnibox. Required for the Web Share API +
// file_handlers to surface Knox Forge in OS share sheets.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => { /* silent */ });
  });
}

// Capture the install prompt so we can offer it from a button later
let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Tag body so we can show an Install banner / button if we want
  document.body.classList.add("can-install");
});
window.addEventListener("appinstalled", () => {
  deferredInstallPrompt = null;
  document.body.classList.remove("can-install");
  showToast("Knox Forge installed! 'Send to Bambu' now opens your OS share sheet.");
});

async function triggerForgeInstall() {
  if (!deferredInstallPrompt) {
    showToast("Use Chrome's address bar → Install Knox Forge icon (looks like a monitor with a down arrow).", 7000);
    return;
  }
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
}
