    `).join("");
    batchStrip.querySelectorAll(".scan-thumb-remove").forEach(b => b.addEventListener("click", () => {
      scanBatchPhotos.splice(Number(b.dataset.i), 1);
      refreshBatchStrip(); refreshControls();
    }));
  }

  function wireBatchMode() {
    bindStartCamera(); refreshBatchStrip();
    document.getElementById("scan-capture")?.addEventListener("click", () => {
      if (scanBatchPhotos.length >= 16) return showToast("16-view max. Remove some to add more.", 4000);
      const photo = captureScanPhoto(video);
      if (!photo) return showToast("Couldn't capture");
      scanBatchPhotos.push(photo);
      refreshBatchStrip(); refreshControls();
    });
    document.getElementById("scan-clear-batch")?.addEventListener("click", () => {
      if (scanBatchPhotos.length === 0) return;
      if (!confirm(`Clear all ${scanBatchPhotos.length} photos?`)) return;
      scanBatchPhotos = []; refreshBatchStrip(); refreshControls();
    });
    document.getElementById("scan-generate")?.addEventListener("click", () => runScanGenerate(scanBatchPhotos, "multi-angle"));
  }

  function wireVideoMode() {
    bindStartCamera();
    document.getElementById("scan-record-start")?.addEventListener("click", () => {
      if (!scanStream) return showToast("Start the camera first");
      scanRecordChunks = [];
      const mime = MediaRecorder.isTypeSupported("video/webm;codecs=vp9") ? "video/webm;codecs=vp9"
                 : MediaRecorder.isTypeSupported("video/webm;codecs=vp8") ? "video/webm;codecs=vp8"
                 : MediaRecorder.isTypeSupported("video/webm") ? "video/webm"
                 : MediaRecorder.isTypeSupported("video/mp4") ? "video/mp4"
                 : "";
      if (!mime) return showToast("Your browser can't record video. Use multi-angle photo mode instead.");
      try {
        scanRecorder = new MediaRecorder(scanStream, { mimeType: mime });
        scanRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) scanRecordChunks.push(e.data); };
        scanRecorder.onstop = async () => {
          recIndicator.style.display = "none";
          const blob = new Blob(scanRecordChunks, { type: mime });
          showToast("Extracting frames…", 3000);
          try {
            const frames = await extractVideoFrames(blob, 12);
            if (frames.length === 0) throw new Error("Couldn't extract frames");
            video.style.display = "none"; preview.src = frames[0].dataUrl; preview.style.display = "block";
            stopScanCamera();
            runScanGenerate(frames, "video-pan");
          } catch (e) {
            showToast("Frame extraction failed: " + e.message, 5000);
            document.getElementById("scan-record-stop").style.display = "none";
            document.getElementById("scan-record-start").style.display = "inline-flex";
          }
        };
        scanRecorder.start();
        recIndicator.style.display = "block";
        document.getElementById("scan-record-start").style.display = "none";
        document.getElementById("scan-record-stop").style.display = "inline-flex";
        setTimeout(() => { if (scanRecorder && scanRecorder.state === "recording") scanRecorder.stop(); }, 15000);
      } catch (e) { showToast("Couldn't start recording: " + e.message, 5000); }
    });
    document.getElementById("scan-record-stop")?.addEventListener("click", () => {
      if (scanRecorder && scanRecorder.state === "recording") scanRecorder.stop();
    });
  }

  async function runScanGenerate(images, modeLabel) {
    const genBtn = document.getElementById("scan-generate") || document.getElementById("scan-record-stop");
    if (genBtn) { genBtn.disabled = true; genBtn.innerHTML = `<span class="spinner"></span> Analyzing ${images.length} view${images.length === 1 ? "" : "s"}…`; }
    try {
      const spec = await scanGenerateFromImages(images, "");
      lastSpec = spec;
      lastPrompt = `(scanned via ${modeLabel}, ${images.length} view${images.length === 1 ? "" : "s"})`;
      currentRoute = "forge";
      const mainEl = document.querySelector(".main");
      renderForge(mainEl);
      const confLabel = spec.confidence ? ` (confidence: ${spec.confidence})` : "";
      const idLabel = spec.identifiedObject ? `Identified: ${spec.identifiedObject}${confLabel}.` : "Model generated.";
      showToast(`${idLabel} View + export in Forge.`, 8000);
    } catch (e) {
      showToast("Scan failed: " + (e.message || "unknown"), 8000);
      if (genBtn) { genBtn.disabled = false; refreshControls(); }
    }
  }
}

// ───── Doom Printing ─────
let doomFeed = [];
let doomIndex = 0;
const DOOM_SAVED_KEY = "forge:doom-saved";

function getDoomSaved() { try { return JSON.parse(localStorage.getItem(DOOM_SAVED_KEY) || "[]"); } catch { return []; } }
function saveDoomItem(item) {
  const all = getDoomSaved();
  if (!all.find(m => m.url === item.url)) {
    all.unshift({ ...item, savedAt: new Date().toISOString() });
    localStorage.setItem(DOOM_SAVED_KEY, JSON.stringify(all.slice(0, 200)));
  }
}

async function fetchDoomFeed() {
  const r = await fetch(`${NEXUS_API_BASE}/api/ai/doom-feed?source=both`, { method: "GET" });
  const j = await r.json().catch(() => ({}));
  if (!r.ok || j.ok === false) throw new Error(j.error || "Couldn't load the feed");
  return Array.isArray(j.items) ? j.items : [];
}

function renderDoomPrinting(el) {
  el.innerHTML = `
    <header class="page-header">
      <div class="page-title">${ICONS.flame}<span style="margin-left:8px;vertical-align:middle">Doom Printing</span></div>

  const host = document.getElementById("doom-host");
  host.innerHTML = `<div class="doom-empty"><span class="spinner"></span> Loading the feed…</div>`;
  fetchDoomFeed()
    .then(items => { doomFeed = items; doomIndex = 0; renderDoomCard(host); })
    .catch(err => { host.innerHTML = `<div class="doom-empty">Couldn't load the feed: ${escapeHtml(err.message)}<br><br>The Printables + MakerWorld endpoints can be flaky. Pull to refresh.</div>`; });

let modelsFilter = "";

        ${tagF ? `<button class="tag-filter-chip" data-tag="">All</button>` : ""}
      </div>` : ""}

    ${bulkSelectMode && anySelected ? `<div class="bulk-select-bar">
      <span class="bulk-select-count">${bulkSelectedIds.size} selected</span>
      <button class="btn btn-secondary" id="bulk-export-zip" style="width:auto;padding:7px 14px;font-size:12px">📦 Export ZIP</button>
      <button class="btn btn-secondary" id="bulk-deselect" style="width:auto;padding:7px 14px;font-size:12px">Deselect all</button>
    </div>` : ""}
    ${models.length === 0 && (filter || tagF) ? `
      <div class="empty"><div class="empty-icon">${ICONS.search}</div><h2>No matches</h2><p>Nothing matches your search. Try a different word or clear the filter.</p></div>
    ` : allModels.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">${ICONS.models}</div>
        <h2>Nothing saved yet</h2>
        <p>Generate a model in Forge and tap Save — it'll show up here with a 3D thumbnail you can open back up anytime.</p>
        <button class="btn btn-primary" id="models-go-forge" style="width:auto;padding:10px 20px;margin-top:14px">${ICONS.sparkles}<span style="margin-left:6px">Generate your first model</span></button>

    lastSpec = m.spec; lastPrompt = m.prompt || "";

    const m = models.find(x => x.id === Number(b.dataset.export));
    if (!m || !m.spec) return showToast("No spec for this model", 2000, null, "warn");
    const prevSpec = lastSpec, prevGroup = viewerGroup;
    lastSpec = m.spec;
    viewerGroup = buildThreeGroupFromSpec(m.spec);
    const fmtId = getDefaultExportFormat();
    incrementDownloadCount(m.id);
    if (fmtId === "obj") exportOBJ();
    else if (fmtId === "3mf") export3MF();
    else exportSTL();
    lastSpec = prevSpec; viewerGroup = prevGroup;
  }));

  document.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", (e) => {
    e.stopPropagation();
    const m = models.find(x => x.id === Number(b.dataset.del));

    deleteSavedModel(Number(b.dataset.del)); renderPage();
  }));

  document.querySelectorAll(".model-card").forEach(card => card.addEventListener("click", (e) => {
    if (e.target.closest("button") || e.target.closest("input")) return;
    if (bulkSelectMode) {
      const id = Number(card.dataset.id);
      if (bulkSelectedIds.has(id)) bulkSelectedIds.delete(id); else bulkSelectedIds.add(id);
      renderModels(el); return;

    const id = Number(card.dataset.id);
    const m = models.find(x => x.id === id);
    if (!m) return;
    lastSpec = m.spec; lastPrompt = m.prompt || "";
    currentRoute = "forge"; renderShell();
  }));
}

  el.innerHTML = `

        ` : chatHistory.map(m => `<div class="msg ${m.role === "user" ? "user" : "bot"}${m.thinking ? " thinking" : ""}">${escapeHtml(m.content)}</div>`).join("")}
      </div>
      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="e.g. My PLA print is curling on the corners — what\'s wrong?" rows="1"></textarea>
        <button class="chat-send" id="chat-send">Send</button>
      </div>
    </div>
  `;
  const msgs = document.getElementById("msgs");
  msgs.scrollTop = msgs.scrollHeight;
  const send = async () => {
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text) return;
    chatHistory.push({ role: "user", content: text });
    chatHistory.push({ role: "assistant", content: "Thinking…", thinking: true });
    input.value = "";
    renderAssistant(el);
    try {
      const reply = await chatAssistant(chatHistory.filter(m => !m.thinking));
      chatHistory = chatHistory.filter(m => !m.thinking);
      chatHistory.push({ role: "assistant", content: reply });
    } catch (ex) {
      chatHistory = chatHistory.filter(m => !m.thinking);
      chatHistory.push({ role: "assistant", content: "Sorry — couldn\'t reach the AI. Try again in a moment." });
    }
    renderAssistant(el);
  };
  document.getElementById("chat-send").addEventListener("click", send);
  document.getElementById("chat-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
}

    if (e.key === "r" || e.key === "R") { if (viewerGroup) { setCameraPreset("iso"); showToast("Camera reset", 1000, null, "info"); } }

const FORGE_TOUR_SEEN_KEY = "forge:tour-seen";
function maybeShowOnboarding() {
  if (localStorage.getItem(FORGE_TOUR_SEEN_KEY) === "1") return;
  if (!getSession()) return;
  setTimeout(() => showOnboardingTour(), 600);
}
function showOnboardingTour() {
  const steps = [
    { art: "✨", title: "Welcome to Forge", body: "Forge turns plain English into 3D-printable models. Type what you want, the AI figures out the geometry, sizes it to real-world dimensions, and gives you an STL ready to print." },
    { art: "📷", title: "Or scan something real", body: "Point your camera at an object. Forge identifies it and builds a model sized to the actual thing. Single photo, multi-angle batch, or video pan — your call." },
    { art: "🔄", title: "Refine instead of restarting", body: "After it generates, type follow-ups like \"make the walls thicker\" or \"add a divider.\" The AI tweaks the model — no more starting over when 90% is right." },
    { art: "🛠️", title: "Send to your slicer", body: "Pick your printer in Settings for real print-time estimates. Click Bambu Studio / Cura / OrcaSlicer in the export row — the STL drops into your slicer ready to print." },
  ];
  let i = 0;
  const modal = document.createElement("div");
  modal.className = "forge-modal";
  function renderStep() {
    const s = steps[i];
    modal.innerHTML = `
      <div class="forge-modal-card tour-card">
        <div class="tour-art">${s.art}</div>
        <div class="forge-modal-title">${escapeHtml(s.title)}</div>
        <div style="font-size:14px;color:var(--text);line-height:1.55;margin-top:8px">${escapeHtml(s.body)}</div>
        <div class="tour-dots">${steps.map((_, n) => `<div class="tour-dot ${n === i ? "active" : ""}"></div>`).join("")}</div>
        <div class="tour-actions">
          <button class="btn btn-secondary" id="tour-skip">${i === steps.length - 1 ? "Got it" : "Skip tour"}</button>
          ${i === 0 ? `<button class="btn btn-secondary" id="tour-skip-to-gen" style="font-size:12px;padding:9px 14px">Skip → Start generating</button>` : ""}
          <button class="btn btn-primary" id="tour-next">${i === steps.length - 1 ? "Start building" : "Next →"}</button>
        </div>
      </div>
    `;
    document.getElementById("tour-skip").addEventListener("click", () => { localStorage.setItem(FORGE_TOUR_SEEN_KEY, "1"); modal.remove(); });
    document.getElementById("tour-skip-to-gen")?.addEventListener("click", () => {
      localStorage.setItem(FORGE_TOUR_SEEN_KEY, "1");
      modal.remove();
      currentRoute = "forge";
      renderShell();
      setTimeout(() => {
        const promptEl = document.getElementById("prompt");
        if (promptEl) { promptEl.focus(); promptEl.scrollIntoView({ behavior: "smooth", block: "center" }); }
      }, 200);
    });
    document.getElementById("tour-next").addEventListener("click", () => {
      i++;
      if (i >= steps.length) { localStorage.setItem(FORGE_TOUR_SEEN_KEY, "1"); modal.remove(); return; }
      renderStep();
    });
  }
  renderStep();
  document.body.appendChild(modal);
}

// PWA: register service worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}

let deferredInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  document.body.classList.add("can-install");
});
window.addEventListener("appinstalled", () => {
  deferredInstallPrompt = null;
  document.body.classList.remove("can-install");
  showToast("Forge installed!");
});

async function triggerForgeInstall() {
  if (!deferredInstallPrompt) {
    showToast("Use Chrome\'s address bar → Install Forge icon.", 7000);
    return;
  }
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
}
</script>
